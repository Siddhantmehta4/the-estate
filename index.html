<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Estate">
<meta name="theme-color" content="#0C0908">
<link rel="manifest" href='data:application/manifest+json,{"name":"The Estate","short_name":"Estate","display":"standalone","background_color":"%230C0908","theme_color":"%230C0908","start_url":"."}'>
<title>The Estate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=La+Belle+Aurore&family=IM+Fell+English:ital@0;1&display=swap');
:root{
  --night:#141010; --amber:#D9A441; --brass:#C9A96A; --steel:#9FB6BE; --violet:#9D8BD4;
  --ivory:#F3EAD8; --ink:#2B2620; --inkblue:#26324F; --dim:#6B615A;
  --serif:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,system-ui,sans-serif;
  --hand:'La Belle Aurore',cursive; --fell:'IM Fell English',Georgia,serif;
  --heat:0.7;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{margin:0;min-height:100%}
body{font-family:var(--sans);color:var(--ivory);background:#0C0908;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));min-height:100vh;transition:background 1.2s ease}
/* ---- room atmospheres (board v4, corrected) ---- */
body.room-hall{background:
  radial-gradient(340px 260px at 50% 32%, rgba(217,164,65,.20) 0%, transparent 70%),
  radial-gradient(600px 420px at 50% 40%, rgba(240,214,150,.05) 0%, transparent 70%),
  linear-gradient(180deg,#1B1512 0%, #141110 55%, #0D0A09 100%)}
body.room-obs{background:linear-gradient(180deg,#0C1018 0%, #0B0E14 55%, #0A0B0F 100%)}
body.room-salon{background:
  radial-gradient(300px 200px at 14% 0%, rgba(217,164,65,.12) 0%, transparent 60%),
  linear-gradient(180deg,#241511 0%, #291710 45%, #31190F 100%)}
body.room-mine{background:linear-gradient(180deg,#151110 0%, #100D0C 30%, #0B0908 58%, #070506 100%)}
body.room-mine.d1{background:linear-gradient(180deg,#121010 0%, #0D0B0A 30%, #090707 58%, #060404 100%)}
body.room-mine.d2{background:linear-gradient(180deg,#100E0E 0%, #0B0909 30%, #070606 58%, #050303 100%)}
body.room-mine.d3{background:linear-gradient(180deg,#0D0C0C 0%, #090808 30%, #060505 58%, #040202 100%)}
body.room-lib{background:
  radial-gradient(400px 260px at 50% 0%, rgba(240,214,150,.07), transparent 70%),
  linear-gradient(180deg,#171110 0%, #131010 55%, #0E0C0B 100%)}
body.room-sky{background:linear-gradient(180deg,#0B0E1A 0%, #0C0D16 55%, #100D0C 100%)}
#app{max-width:560px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 20px 40px;min-height:92vh;display:flex;flex-direction:column;position:relative;z-index:2}
.topRow{display:flex;align-items:center;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.34);margin-bottom:8px;position:relative;z-index:30}
.topRow .roomName{cursor:pointer}
.topRow .mid{margin-left:auto;margin-right:14px}
.menuBtn{color:rgba(201,169,106,.85);font-size:16px;line-height:1;cursor:pointer;background:none;border:none;padding:4px 6px}
.menuPanel{position:absolute;top:34px;right:0;z-index:40;background:rgba(16,12,10,.97);border:1px solid rgba(201,169,106,.3);border-radius:12px;padding:8px 0;box-shadow:0 14px 40px rgba(0,0,0,.6);min-width:164px}
.menuPanel button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 18px;font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D8C49A;cursor:pointer}
.menuPanel button.sep{border-top:1px solid rgba(201,169,106,.15);margin-top:4px;padding-top:13px}
.searchWrap{margin:4px 0 14px;position:relative;z-index:20}
.searchBar{display:flex;align-items:center;border:1px solid rgba(201,169,106,.35);border-radius:12px;padding:11px 14px;background:rgba(0,0,0,.3)}
.searchBar input{flex:1;background:none;border:none;outline:none;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ivory)}
.searchBar input::placeholder{color:rgba(240,228,200,.4)}
.searchBar .x{color:#8A7259;background:none;border:none;font-size:16px;cursor:pointer;padding:0 2px}
/* ---- the one action-grid law: equal fixtures, always ---- */
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.actions.two{grid-template-columns:repeat(2,1fr)}
.actions.one{grid-template-columns:1fr}
.act{display:flex;align-items:center;justify-content:center;height:46px;border-radius:12px;border:1px solid rgba(201,169,106,.3);font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#D8C49A;background:linear-gradient(180deg, rgba(201,169,106,.07), rgba(201,169,106,.02));cursor:pointer}
.act.primary{border-color:rgba(217,164,65,.6);color:#EBD9AE;box-shadow:0 0 24px rgba(217,164,65,.12)}
.act:disabled{opacity:.45}
button.act{font-family:var(--sans)}
.ghost{background:none;border:none;color:#9C8A6D;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;padding:8px}
.err{color:#C96A50;font-size:13px;margin:12px 0;text-align:center;white-space:pre-wrap}
.loadingLine{text-align:center;color:#B9AC97;font-style:italic;font-family:var(--serif);font-size:14px;margin:20px 0}
.toast{position:fixed;left:50%;bottom:calc(30px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(20,14,10,.95);border:1px solid rgba(217,164,65,.4);color:#EBD9AE;font-family:var(--serif);font-style:italic;font-size:14px;padding:11px 22px;border-radius:999px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:toastIn .3s ease;max-width:86vw;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1}}
.emptyRoom{text-align:center;color:#8F8377;font-family:var(--serif);font-style:italic;font-size:15px;margin-top:60px;line-height:1.7}
/* ---------------- HALL ---------------- */
.welcome{margin-top:13vh;text-align:center;font-family:var(--serif);font-weight:450;font-size:26px;color:#F0E4C8;text-shadow:0 0 34px rgba(217,164,65,.28)}
.captureBar{margin-top:30px;border:1px solid rgba(217,164,65,.45);border-radius:16px;background:rgba(0,0,0,.3);padding:16px 16px 12px;box-shadow:0 0 60px rgba(217,164,65,.16), inset 0 1px 0 rgba(255,255,255,.05)}
.captureBar textarea{width:100%;background:none;border:none;outline:none;resize:none;font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.5;color:var(--ivory);min-height:56px}
.captureBar textarea::placeholder{color:rgba(240,228,200,.42)}
.modesRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.modeBtn{display:flex;align-items:center;justify-content:center;gap:7px;background:none;border:none;color:#9C8A6D;font-family:var(--sans);font-size:10px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;padding:6px 0}
.modeBtn .g{font-size:14px;line-height:1}
.hall .actions{margin-top:24px}
.hallFoot{margin-top:auto;text-align:center;padding-top:40px}
/* ---------------- OBSERVATORY ---------------- */
.chartBg{position:fixed;inset:0;opacity:.5;pointer-events:none;z-index:0}
.chartBg svg{width:100%;height:100%}
.chartBg path{fill:none;stroke:rgba(159,182,190,.09);stroke-width:1}
.sextantFix{position:fixed;right:-52px;top:-52px;width:180px;height:180px;border-radius:50%;border:1px solid rgba(201,169,106,.35);pointer-events:none;z-index:0}
.sextantFix:after{content:"";position:absolute;inset:15px;border-radius:50%;border:1px dashed rgba(201,169,106,.18)}
.obsStar{position:fixed;border-radius:50%;background:#C9D8DC;pointer-events:none;z-index:0}
.twk{animation:twk 3.6s ease-in-out infinite}
.twk2{animation:twk 4.8s ease-in-out infinite 1.3s}
@keyframes twk{0%,100%{opacity:.9}50%{opacity:.25}}
.obsQuote{font-family:var(--serif);font-weight:450;font-size:20px;line-height:1.55;color:#ECF2F2;margin-top:26px;text-shadow:0 0 34px rgba(159,182,190,.3);white-space:pre-wrap}
.obsQuote:first-letter{color:#E3CD9A}
.obsRule{display:flex;align-items:center;gap:12px;margin:20px 0 12px}
.obsRule .line{flex:1;height:1px;background:linear-gradient(90deg, rgba(201,169,106,.5), transparent)}
.obsRule .star{color:var(--brass);font-size:11px}
.obsSrc{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:#8E9CA2;cursor:pointer}
.obsClarify{font-size:14px;line-height:1.72;color:#C2CDCF;white-space:pre-wrap}
.footnote{font-size:11.5px;font-style:italic;color:#7E8C92;margin-top:12px}
.obsFooting{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:rgba(159,182,190,.7);margin-top:16px;justify-content:center}
.obsFooting i{width:6px;height:6px;border-radius:50%;background:var(--brass);box-shadow:0 0 10px var(--brass)}
.obs .actions{margin-top:26px}
.obs .act{border-color:rgba(159,182,190,.3);color:#BFD0D4;background:linear-gradient(180deg, rgba(159,182,190,.06), rgba(159,182,190,.02))}
.obs .act.primary{border-color:rgba(201,169,106,.55);color:#E3CD9A}
.sealedBlock{margin-top:22px;border-top:1px solid rgba(201,169,106,.25);padding-top:14px}
.sealedBlock small{display:block;font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:#8A7452;margin-bottom:4px}
.sealedBlock .inkw{font-family:var(--hand);font-size:22px;line-height:1.35;color:#B9C4E8}
/* ---------------- SALON ---------------- */
.hearthGlow{position:fixed;left:0;right:0;bottom:0;height:46vh;pointer-events:none;z-index:0;
  background:radial-gradient(60% 92% at 50% 108%, rgba(255,166,80,calc(.38*var(--heat))) 0%, rgba(235,130,55,calc(.19*var(--heat))) 42%, transparent 72%);
  animation:hearthB 5s ease-in-out infinite}
@keyframes hearthB{0%,100%{opacity:1}50%{opacity:.8}}
.salonHead{text-align:center;margin:6px 0 2px}
.salonHead .who{font-family:var(--serif);font-size:16px;letter-spacing:.13em;color:#EDD3A0;text-shadow:0 0 26px rgba(217,164,65,.25)}
.salonHead .sub{font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:#A08363;margin-top:5px}
.salonHead .rule{width:64px;height:1px;background:linear-gradient(90deg,transparent,rgba(217,164,65,.7),transparent);margin:12px auto 0}
.sideToggle{display:flex;justify-content:center;margin:12px auto 0;border:1px solid rgba(217,164,65,.35);border-radius:999px;overflow:hidden;width:fit-content}
.sideToggle button{font-family:var(--sans);font-size:9px;letter-spacing:.16em;text-transform:uppercase;padding:8px 14px;color:#A08363;background:none;border:none;cursor:pointer}
.sideToggle button.on{background:rgba(217,164,65,.18);color:#F0DCAE}
.transcript{flex:1;margin-top:16px;padding-bottom:8px}
.turn{margin-bottom:20px}
.turn .speaker{display:flex;align-items:center;gap:12px;font-size:9px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:7px}
.turn .speaker .ln{flex:1;height:1px;background:rgba(217,164,65,.16)}
.turn.them .speaker{color:#C29A64}
.turn.me .speaker{color:#E7B953}
.turn p{margin:0;font-family:var(--serif);font-size:15px;line-height:1.66;white-space:pre-wrap}
.heat0 p{color:#F7E9C6}.heat1 p{color:#E9D2A6}.heat2 p{color:#D7BC8F}.heat3 p{color:#C3A87E}.heat4 p{color:#B0966F}
.floorCross{text-align:center;font-family:var(--serif);font-style:italic;font-size:12px;color:rgba(230,180,90,.75);margin:6px 0 18px}
.salonInputRow{position:sticky;bottom:0;padding:8px 0 4px;display:flex;gap:10px;align-items:flex-end;background:transparent}
.salonInput{flex:1;border:none;border-bottom:1px solid rgba(217,164,65,.5);background:none;outline:none;font-family:var(--serif);font-style:italic;font-size:15px;color:#F5E8C8;padding:10px 2px;resize:none;min-height:20px}
.salonInput::placeholder{color:rgba(240,220,180,.42)}
.sendBtn{background:none;border:none;color:var(--amber);font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;padding:10px 4px;font-family:var(--sans)}
.salonFoot{display:flex;justify-content:center;gap:8px;margin-top:10px}
/* ---------------- MINE ---------------- */

/* ================= THE SALON — WHISKY & WINE ================= */
.turn p{ transition: color 1.4s ease, text-shadow 1.4s ease; }
.salonHead .who{ font-size:19px; }
.pourLabel{ text-align:center; font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:#B69B72; margin-top:14px; }
.emojiToggle{ border-width:1.5px !important; box-shadow:0 0 22px rgba(0,0,0,.35); }
.emojiToggle button{ font-size:36px; padding:16px 40px; line-height:1; opacity:.42; filter:grayscale(.6); transition:all .35s ease; }
.emojiToggle button.on{ opacity:1; filter:none; transform:scale(1.06); }
.salon:not(.wine) .emojiToggle button.on{ background:rgba(255,140,30,.2); box-shadow:inset 0 0 20px rgba(255,140,30,.25); }
.salon.wine .emojiToggle button.on{ background:rgba(200,110,120,.22); box-shadow:inset 0 0 20px rgba(200,110,120,.25); }

body.room-salon::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(120% 120% at 50% 46%, transparent 58%, rgba(0,0,0,.26) 100%);
}
body.room-salon.wine::after{ background:radial-gradient(120% 120% at 50% 46%, transparent 60%, rgba(10,6,10,.3) 100%); }

/* ---- WHISKY — a bed of coals, not three lamps ---- */
body.room-salon{
  background:
    radial-gradient(150% 60% at 50% 116%, rgba(255,122,26,.30) 0%, rgba(196,60,12,.12) 42%, transparent 70%),
    radial-gradient(60% 30% at 18% 108%, rgba(255,170,60,.14) 0%, transparent 68%),
    radial-gradient(60% 30% at 82% 110%, rgba(255,90,20,.12) 0%, transparent 68%),
    linear-gradient(180deg,#150903 0%, #1D0C05 34%, #2A1006 64%, #3A1607 100%);
  background-size:100% 100%, 130% 130%, 130% 130%, 100% 100%;
  animation: whiskyBreathe 9s ease-in-out infinite;
}
@keyframes whiskyBreathe{
  0%,100%{background-position:50% 100%, 18% 100%, 82% 100%, 0 0; background-size:100% 100%,130% 130%,130% 130%,100% 100%;}
  50%{background-position:50% 97%, 24% 96%, 76% 104%, 0 0; background-size:100% 106%,138% 136%,124% 128%,100% 100%;}
}
/* the coalbed: one continuous heat field along the floor */
.coalbed{
  position:fixed; left:-10%; right:-10%; bottom:-6%; height:36%; pointer-events:none; z-index:0;
  filter:blur(34px);
  background:
    radial-gradient(58% 100% at 30% 100%, rgba(255,150,40,.5) 0%, transparent 72%),
    radial-gradient(52% 92% at 62% 100%, rgba(255,96,22,.44) 0%, transparent 74%),
    radial-gradient(44% 84% at 84% 100%, rgba(255,178,70,.32) 0%, transparent 76%),
    radial-gradient(40% 78% at 12% 100%, rgba(230,70,16,.34) 0%, transparent 76%);
  background-size:180% 130%, 160% 120%, 150% 120%, 150% 120%;
  animation: coalDrift 11s ease-in-out infinite;
}
@keyframes coalDrift{
  0%,100%{ background-position:10% 100%, 60% 100%, 88% 100%, 6% 100%; opacity:.86; }
  33%{ background-position:26% 96%, 46% 102%, 74% 98%, 18% 102%; opacity:1; }
  66%{ background-position:2% 102%, 72% 96%, 96% 102%, 0% 98%; opacity:.78; }
}
/* heat haze rising off the coals — soft, wide, slow */
.heatveil{
  position:fixed; left:0; right:0; bottom:0; height:62%; pointer-events:none; z-index:0;
  filter:blur(46px); opacity:.5;
  background:
    radial-gradient(38% 60% at 24% 108%, rgba(255,132,36,.34) 0%, transparent 70%),
    radial-gradient(42% 66% at 58% 112%, rgba(255,104,26,.3) 0%, transparent 72%),
    radial-gradient(34% 56% at 84% 108%, rgba(255,160,54,.26) 0%, transparent 70%);
  background-size:140% 150%, 150% 160%, 130% 140%;
  animation: veilRise 14s ease-in-out infinite;
}
@keyframes veilRise{
  0%,100%{ background-position:20% 100%, 56% 100%, 86% 100%; transform:translateY(0) scaleY(1); }
  50%{ background-position:30% 88%, 48% 84%, 74% 90%; transform:translateY(-2%) scaleY(1.06); }
}
.salon:not(.wine) .turn:last-child p{ animation: emberText 4.2s ease-in-out infinite; }
@keyframes emberText{ 0%,100%{text-shadow:0 0 6px rgba(255,132,36,.14);} 50%{text-shadow:0 0 20px rgba(255,132,36,.42);} }
.salon:not(.wine) .salonHead .rule{ background:linear-gradient(90deg,transparent, rgba(255,130,30,.9), transparent); box-shadow:0 0 14px rgba(255,120,30,.5); }

/* ---- WINE — deeper, redder ---- */
body.room-salon.wine{
  background:
    linear-gradient(115deg, transparent 30%, rgba(255,255,255,.05) 46%, transparent 60%),
    radial-gradient(78% 46% at 50% 112%, rgba(80,105,145,.15) 0%, transparent 66%),
    linear-gradient(180deg,#330D14 0%, #401019 40%, #4C1420 70%, #300D13 100%);
  background-size:220% 220%, 100% 100%, 100% 100%;
  animation: satinSweep 12s ease-in-out infinite;
}
@keyframes satinSweep{ 0%{background-position:0% 30%,50% 100%,0 0;} 50%{background-position:100% 70%,50% 94%,0 0;} 100%{background-position:0% 30%,50% 100%,0 0;} }
.hearthGlow.wine{
  background:
    radial-gradient(65% 90% at 50% 112%, rgba(150,26,40,calc(.42*var(--heat))) 0%, rgba(96,20,32,calc(.18*var(--heat))) 46%, transparent 74%),
    radial-gradient(62% 38% at 20% 100%, rgba(90,118,152,calc(.17*var(--heat))) 0%, transparent 72%),
    radial-gradient(62% 38% at 80% 100%, rgba(90,118,152,calc(.13*var(--heat))) 0%, transparent 72%);
  animation: hearthB 6.5s ease-in-out infinite;
}
.ripple{ position:absolute; left:50%; bottom:6px; width:10px; height:10px; margin-left:-5px; border-radius:50%;
  border:1px solid rgba(200,110,120,.5); pointer-events:none; animation: rippleOut 2.2s ease-out forwards; }
@keyframes rippleOut{ 0%{width:10px;height:10px;margin-left:-5px;opacity:.7} 100%{width:160px;height:160px;margin-left:-80px;opacity:0} }
.salon.wine .salonHead .rule{ background:linear-gradient(90deg,transparent, rgba(200,110,120,.7), transparent); box-shadow:0 0 10px rgba(180,80,90,.35); }
.salon.wine .heat0 p{color:#E8A3A8}.salon.wine .heat1 p{color:#D48990}.salon.wine .heat2 p{color:#B96E78}.salon.wine .heat3 p{color:#9A5964}.salon.wine .heat4 p{color:#7A4650}
.salon.wine .turn.me .speaker{color:#E0949F}.salon.wine .turn.them .speaker{color:#AD7480}
.salon.wine .turn:last-child p{
  background:linear-gradient(100deg, #E8A3A8 30%, #FBE4E4 50%, #E8A3A8 70%);
  background-size:220% 100%; -webkit-background-clip:text; background-clip:text;
  color:transparent; -webkit-text-fill-color:transparent;
  animation: satinText 4.5s ease-in-out infinite;
}
@keyframes satinText{ 0%{background-position:0% 0} 50%{background-position:100% 0} 100%{background-position:0% 0} }
.salon.wine .salonInput{border-bottom-color:rgba(200,110,120,.55)}
.salon.wine .salonInput::placeholder{color:rgba(228,180,186,.4)}
.salon.wine .sendBtn{color:#D79098}
.colFix{position:fixed;top:0;bottom:0;width:24px;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(90deg, rgba(255,255,255,.055) 0 2px, rgba(0,0,0,.16) 2px 6px, rgba(255,255,255,.02) 6px 8px)}
.colFix.l{left:0}.colFix.r{right:0}
.colFix .capital{position:absolute;top:44px;left:-6px;right:-6px;height:10px;background:linear-gradient(180deg,#2A2320,#181310);border-radius:2px}
.colFix .uplight{position:absolute;left:0;right:0;bottom:0;height:34vh;background:linear-gradient(180deg, transparent, rgba(157,139,212,.2))}
.mineGlow{position:fixed;left:0;right:0;bottom:0;pointer-events:none;z-index:0;height:40vh;
  background:radial-gradient(52% 60% at 50% 106%, rgba(217,164,65,.36) 0%, transparent 58%),
             radial-gradient(90% 90% at 50% 112%, rgba(157,139,212,.28) 0%, rgba(157,139,212,.09) 50%, transparent 78%);
  animation:glowB 6s ease-in-out infinite;transition:height 1s ease}
@keyframes glowB{0%,100%{opacity:1}50%{opacity:.78}}
.mineWrap{padding:0 16px}
.handoff{font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:#8B7B60;margin:10px 0 20px;text-align:center}
.mineViewport{transition:transform .7s cubic-bezier(.5,0,.3,1), opacity .7s ease}
.mineViewport.dropping{transform:translateY(-44px);opacity:0}
.stratum{margin:0 4px 18px;padding:13px 16px;border-left:1px solid rgba(255,255,255,.14);animation:strataIn .6s ease}
@keyframes strataIn{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
.stratum .lv{font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:#7A6C5C;margin-bottom:5px;display:flex;justify-content:space-between}
.stratum .tx{font-family:var(--serif);font-size:14px;line-height:1.6;color:#C4B7A2;white-space:pre-wrap}
.stratum.past{opacity:.5}

<body class="room-hall">
<div id="fx"></div>
<div id="app"></div>
<div id="modalMount"></div>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="importInput" accept="application/json" style="display:none">

<script>
/* ============================================================
   THE ESTATE — v1 · a house for the lines that stop you
   Local-first PWA · bring-your-own-key · six rooms, one night
   Inviolable: the sovereign seal · footing honesty · the AI
   speaks in three places · the debater opposes YOU · rung by rung.
   ============================================================ */
const MODEL = "claude-sonnet-5";

const S = {
  view:"hall", key:localStorage.getItem("estate-key")||"",
  notes:[], note:null,
  loading:false, error:"",
  libTab:"notes", search:null,
  menuOpen:false, lastWelcome:localStorage.getItem("estate-welcome")||"",
  mineBusy:false, salonBusy:false, heat:0.7,
  skySel:null, skyZoom:1, skyPan:{x:0,y:0},
  libSeal:"sealed",
  hist:[],
};
/* ---------------- utils ---------------- */
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const uid = () => "n"+Date.now()+Math.floor(Math.random()*999);
const parseJSON = raw => { const c=String(raw).replace(/```json|```/g,"").trim(); const a=c.indexOf("{"), b=c.lastIndexOf("}"); if(a<0||b<0) throw new Error("Reading Interrupted — try again."); return JSON.parse(c.slice(a,b+1)); };
function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2400); }
function friendly(e){ const m=(e&&e.message)||""; if(m==="no-key") return "The Estate needs its key — tap ⚿ the key."; return m||"Something slipped — try again."; }
/* ---------------- IndexedDB ---------------- */
const idb = {
  db:null,
  open(){ return new Promise((res,rej)=>{ const r=indexedDB.open("the-estate",1);
    r.onupgradeneeded=()=>{ const d=r.result; if(!d.objectStoreNames.contains("notes")) d.createObjectStore("notes",{keyPath:"id"}); };
    r.onsuccess=()=>{ idb.db=r.result; res(); }; r.onerror=()=>rej(r.error); }); },
  put(note){ return new Promise((res,rej)=>{ if(!idb.db) return res(); const t=idb.db.transaction("notes","readwrite"); t.objectStore("notes").put(note); t.oncomplete=res; t.onerror=()=>rej(t.error); }); },
  all(){ return new Promise((res)=>{ if(!idb.db) return res([]); const r=idb.db.transaction("notes").objectStore("notes").getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>res([]); }); },
};
async function saveNote(n){
  n.updatedAt=Date.now();
  try{ await idb.put(JSON.parse(JSON.stringify(n))); }catch(e){}
  if(!S.notes.find(x=>x.id===n.id)) S.notes.unshift(n);
}
/* ---------------- API ---------------- */
async function api(content, maxTokens, history, forceJSON){
  if(!S.key) throw new Error("no-key");
  const messages = history ? [...history] : [];
  messages.push({role:"user", content});
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{ "Content-Type":"application/json","x-api-key":S.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body:JSON.stringify({model:MODEL, max_tokens:maxTokens||1200, messages})
  });
  if(!res.ok){
    let detail=""; try{ const j=await res.json(); detail=(j.error&&j.error.message)||""; }catch(e){}
    if(res.status===401||res.status===403) throw new Error("The key was refused — check it under ⚿ the key.");
    if(res.status===429) throw new Error(" is catching its breath (rate limit) — a moment, then again.");
    throw new Error("The Estate is unreachable ("+res.status+(detail?": "+detail:"")+").");
  }
  const data = await res.json();
  const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  return txt;
}
async function apiJSON(prompt, maxTokens){
  const strict = prompt + "\n\nCRITICAL: Respond with ONLY the raw JSON object. Begin your reply with { and end it with }. No preamble, no explanation, no markdown fences.";
  try{ return parseJSON(await api(strict, maxTokens)); }
  catch(e){
    if(e && e.message && e.message.indexOf("The ")===0) throw e;
    return parseJSON(await api(strict + "\n\nYour previous reply was not valid JSON. Return the JSON object only.", maxTokens));
  }
}
/* ---------------- prompts ---------------- */
const LAW = `YOU ARE THE VOICE OF THE ESTATE. Your only measure of success: did the person genuinely SEE something they didn't see before? Not "was that eloquent." Not "did that sound wise." Did the light come on.

HOW TO SPEAK
Speak the way a brilliant friend speaks across a table — someone who happens to know a great deal and refuses to perform it. Plain words carrying real weight. If a sentence would be clearer with a smaller word, use the smaller word. Jargon is only permitted where the idea genuinely has no plain-language equivalent, and then you define it in passing, in half a clause, without ceremony.

Assume high intelligence and low context. The person is sharp; they simply may not know this particular thing. Never explain what they obviously know. Never flatter. Never pad.

DIAGNOSE BEFORE YOU SPEAK
Every line asks for something different. Read what THIS one needs:
— A claim about how something works → give the mechanism. What causes what.
— A claim about people or motive → give the pattern underneath, and where it breaks.
— A claim from a specific work → give the move the author is making, and what they're arguing against.
— A moral or aesthetic claim → give what it assumes, and who would deny it.
— A technical or scientific claim → give the actual physics, math, or logic. Precision beats poetry here, always.
— A joke, a lyric, a fragment → treat it seriously; find the real thought inside it. Do not inflate it.
The wrong tool applied beautifully is still the wrong tool.

BE CONCRETE
Prefer the specific to the general. One real example beats three abstractions. If you can name the thing, name it. If you can give a number, give it. Vagueness is the most common way to sound deep while saying nothing.

BE SHORT WHEN SHORT IS TRUE
Length is not effort. If the whole insight fits in three sentences, use three sentences and stop. Never elaborate to fill space. Never restate the point in a new costume and call it a conclusion.

BE HONEST ABOUT FOOTING
If you don't know the source, say so plainly and work from the idea itself. If a claim is contested, say who contests it. If the line is simply wrong, say that too — respectfully, and with the reason. Confident invention is the one unforgivable failure; it destroys the only thing this app is selling, which is trust.

WIT & HUMOR ARE ALLOWED WHEN THEY CARRY WEIGHT
A well-timed and well-placed joke always strengthens understanding. A sharp turn of phrase that makes the idea land is doing real work. A sharp turn of phrase that merely decorates is theft of the person's attention. Know which one you just wrote.`;

  /* Relevance-scored library: considers every sealed note, sends only the ones
   that genuinely connect. Cheap locally, so it scales to thousands. */
const STOP = new Set("the a an and or but of to in is are was were be been it its this that these those for with as at by from on if then than so not no what which who whom whose how why when where you your i my we our they their he she his her".split(" "));
function keyWords(s){ return new Set(String(s).toLowerCase().replace(/[^\w\s]/g," ").split(/\s+/).filter(w=>w.length>3 && !STOP.has(w))); }
function relevantSealed(n, limit){
  const target = keyWords(n.text + " " + (n.clarify||""));
  const tTags = new Set((n.tags||[]).map(t=>String(t).toLowerCase()));
  const scored = S.notes
    .filter(x => x.id!==n.id && x.sealedWord)
    .map(x => {
      const xTags = new Set((x.tags||[]).map(t=>String(t).toLowerCase()));
      let score = 0;
      xTags.forEach(t=>{ if(tTags.has(t)) score += 3; });          // shared concept: strong signal
      const xw = keyWords(x.text + " " + x.sealedWord);
      xw.forEach(w=>{ if(target.has(w)) score += 1; });            // shared substance: weak signal
      return {x, score};
    })
    .filter(o => o.score > 0)
    .sort((a,b)=> b.score - a.score)
    .slice(0, limit || 8);
  if(!scored.length) return "";
  const lines = scored.map(o=>`— On "${String(o.x.text).slice(0,100)}" they concluded: "${o.x.sealedWord}"`).join("\n");
  return `\nWHAT THIS PERSON HAS ALREADY UNDERSTOOD (their own sealed conclusions, in their own words):
${lines}

Use these ONLY where a genuine connection exists — where their prior conclusion truly bears on this idea, supports it, or contradicts it. A real contradiction is the most valuable thing you can surface: name it. If nothing here genuinely connects, ignore this entirely and say nothing about it. A forced connection is worse than none, and they will know.`;
}
  
  function clarifyPrompt(text, libraryBlock){
  return `You are the engine of "The Estate", a capture-and-understanding app. A user captured this line (from a book, a song, a film, a conversation, or their own head):

"${text}"

${LAW}
${libraryBlock||""}
TASKS, in one JSON response:
1. SOURCE: identify the source only if you genuinely recognize it. Footing: "known" (you know this text well), "partial" (you know the author/work thinly), "unknown". NEVER confabulate a source. If it reads as a general thought, source is null.
2. CLARIFY: 60-130 words of immediate value. Easy to understand and follow, like a human explaining to another — what this line is really saying, what it stands on, what it quietly assumes.. The crux of it — IN THE SOURCE'S CONTEXT when known (the line as a move its author is making, never a standalone aphorism). If no source, clarify the idea itself.
3. FOOTNOTE: if speaking without real knowledge of the original text, one honest line, e.g. "answering from relative context, not the original text". Empty string if footing is known.

Respond ONLY with JSON, no fences, no preamble:
{"source":{"title":"","author":"","type":"book|song|film|speech|conversation|thought|other","footing":"known|partial|unknown"} or null,"looksSourced":false,"clarify":"","footnote":""}`;
}
function clarifyImagePrompt(){
  return `You are the engine of "The Estate", a capture-and-understanding app. The user photographed a page or screen. First transcribe the passage they most plausibly captured (the main/central text), then do the tasks below on that transcription.

${LAW}

Respond ONLY with JSON, no fences, no preamble:
{"transcription":"the captured text, verbatim from the image","source":{"title":"","author":"","type":"book|song|film|speech|conversation|thought|other","footing":"known|partial|unknown"} or null,"looksSourced":false,"clarify":"60-130 words, in the source's context when known","footnote":"honest line if footing is not known, else empty"}`;
}
function debateContext(n, libraryBlock){
  const src = n.source && n.source.title ? `Source: ${n.source.title}${n.source.author?" — "+n.source.author:""} (footing: ${n.source.footing})` : "Source: none — a loose thought.";
  const author = n.debate.mode==="author";

  const LEARN = `THE SALON — LEARN MODE

The person is here to understand, not to fight. They will ask questions — some large, some embarrassingly small. Treat every one as worth answering well.

${author?`You are an informed reconstruction of ${n.source.author||"the author"}, speaking first-person about your own work and the ideas in it. Explain what you meant, what you were arguing against, what you got wrong, what you still believe. You are generous here, not defensive — they came to learn from you, not to duel.`:`You are a learning partner: someone who knows a great deal and enjoys explaining it. Not a lecturer. Not a search engine.`}

Answer the actual question asked. Go one useful step past it — the thing they'd have asked next — and then stop. Never dump everything you know. Never say "great question." If they're confused, find the specific place the confusion lives and fix that, rather than restating the whole idea more loudly.

If you don't know, say so and say what you do know.

Under 140 words.`;

  const CHARACTER = `THE SALON — DEBATE MODE

You are not a teacher, not an assistant, not a devil's advocate playing a game. You are an opponent who believes what you're saying and intends to win. That belief is what makes this worth the person's evening.

Attack the strongest version of their position, never a weak one you invented. If their argument has a real weakness, name it precisely and press exactly there — one blade, not five. Scattering objections is what people do when they have none.

Quote their words back when you turn them. "You said X — but X requires Y, and Y is false." That is what being heard feels like.

Concede only when an argument actually lands — then concede cleanly, without sulking, and find the next line of defence. A debater who never yields is a wall, and people learn nothing from walls. A debater who yields to be pleasant is worthless.

Be brief. The sharpest blow is short. Never summarise the exchange. Never say "that's a great point."

Dry, sardonic, warm, or cold — whatever the argument calls for. Never cruel, never patronising. The heat comes from the ideas.`;

  const DEBATE = author
    ? `${CHARACTER}

YOUR SEAT — THE AUTHOR'S CHAIR: You are an informed reconstruction of ${n.source.author||"the author"}, speaking first-person. This is your line and you defend it — from inside your own work, your life, your century.

You never switch sides. Not once. The person may take whatever position they like; you hold the text.

Where your own life contradicts your line, admit it and defend the line anyway — the failure of the man is not the failure of the idea. Where history proved you wrong, you may acknowledge it and argue the idea stands, or stands changed. But you never abandon it.

If your knowledge of this specific text is thin, say so once, honestly, and argue from the ideas you did hold. Never invent a biography you don't have.

Under 130 words.`
    : `${CHARACTER}

YOUR SEAT — THE OPPOSITION: Read the person's position from what they actually say${n.debate.userSide?` — their opening move was: "${String(n.debate.userSide).slice(0,300)}"`:""}. Whatever position they are holding right now, you argue the opposite of it. Always. That is your only loyalty.

If they shift their ground mid-argument, you shift with them — you are always across the table, never beside them. Switching sides never buys them peace; it only hands them the harder job of defending what you were just defending. Never remark on this. Simply turn and take the other side.

Under 120 words.`;

  return `You are the voice inside "The Estate", speaking in the salon.

${LAW}

The captured line: "${n.text}"
${src}
${n.clarify?`The house's earlier reading of it: ${n.clarify}`:""}
${libraryBlock||""}

${n.debate.learn ? LEARN : DEBATE}`;
}
function rungPrompt(n){
  const strata = (n.descent.rungs||[]).map((r,i)=>`${i+1}. ${r.text}${r.sealedWord?` (sealed by the user as: "${r.sealedWord}")`:""}`).join("\n");
  return `You are the engine of "The Estate", generating one rung of a descent to first principles.

${LAW}

THE RUNG, DEFINED: each rung answers exactly one question — "what does the level above stand on?" Find the load-bearing claim above and expose what must be true for it to hold. Deeper rungs naturally become more exact (mechanism, then science/logic/definition) because that is what reduction converges to.

The idea under descent (the user has left the source's context; this is the idea itself): "${n.text}"
${n.clarify?`Clarified as: ${n.clarify}`:""}
${strata?`\nThe descent so far (the user's sealed words are FINAL and must be built on exactly as written):\n${strata}`:"\nThis is the first rung beneath the surface."}
${relevantSealed(n, 10)}

If the last level already stands on an axiom, a definition, a brute empirical fact, or an honest open question — bedrock — set "struck": true and give "closing" (35-65 words: name the gold struck and the questions that remain; plain, no ceremony).

Respond ONLY with JSON, no fences, no preamble:
{"rung":"70-120 words — what the level above stands on","struck":false,"closing":""}`;
}
function tagsPrompt(n){
  return `A note in a knowledge app: "${String(n.text).slice(0,200)}"${n.sealedWord?` — user's own sealed understanding: "${n.sealedWord}"`:""}
Return 2-5 short lowercase concept tags capturing what this note is ABOUT (themes/concepts, not surface words). ONLY JSON, no fences: {"tags":["..."]}`;
}
/* ---------------- flows ---------------- */
function newNote(text){
  return { id:uid(), text:String(text).trim(), createdAt:Date.now(), source:null, looksSourced:false,
    clarify:null, footnote:"", footing:null, sealedWord:null, sealedAt:null,
    debate:null, descent:null, tags:[], bothSides:false };
}
async function runClarify(n, imageB64, mime){
  S.loading = true; S.error=""; render();
  try{
    let r;
    if(imageB64){
      const strict = clarifyImagePrompt() + "\n\nCRITICAL: Respond with ONLY the raw JSON object. Begin with { and end with }. No preamble, no fences.";
      const raw = await api([{type:"image",source:{type:"base64",media_type:mime,data:imageB64}},{type:"text",text:strict}], 1600);
      r = parseJSON(raw);
    } else {
      r = await apiJSON(clarifyPrompt(n.text, relevantSealed(n)), 1600);
    }
    if(r.transcription) n.text = String(r.transcription);
    n.source = (r.source && r.source.title) ? r.source : null;
    n.looksSourced = !!r.looksSourced;
    n.clarify = r.clarify||"";
    n.footnote = r.footnote||"";
    n.footing = n.source ? n.source.footing : null;
   await saveNote(n);
    harvestTags(n);
    S.note = n; setRoom("obs"); S.loading=false; render(); return;
  }catch(e){ S.error = friendly(e); }
  S.loading=false; render();
}
async function captureAction(action){
  const ta = document.getElementById("captureText");
  const text = (ta?ta.value:"").trim();
  if(!text){ toast("the bar is empty"); return; }
  if(!S.key && action!=="save"){ openKeyModal(); return; }
  const n = newNote(text);
  if(action==="save"){ await saveNote(n); harvestTags(n); if(ta) ta.value=""; toast("kept — it's in the library"); return; }
  if(action==="resolve"){ await runClarify(n); return; }
  if(action==="debate"){
    S.loading=true; S.error=""; render();
    try{
      const r = await apiJSON(clarifyPrompt(n.text, relevantSealed(n)), 1600);
      n.source = (r.source && r.source.title) ? r.source : null;
      n.clarify=r.clarify||""; n.footnote=r.footnote||""; n.footing=n.source?n.source.footing:null;
      await saveNote(n);
      S.loading=false; enterSalon(n); return;
    }catch(e){ S.error=friendly(e); S.loading=false; render(); return; }
  }
}
function enterSalon(n){
  if(!n.debate){
    const authorMode = !!(n.source && n.source.author && n.source.footing!=="unknown");
    n.debate = { mode: authorMode?"author":"general", learn:false,
      userSide:"", sidePro:false, transcript:[], crossings:0 };
  }
  n.debate.learn=false;
  S.note=n; setRoom("salon"); S.heat=.7; render();
}
function setSalonMode(learn){
  const n=S.note; if(!n||!n.debate||n.debate.learn===learn) return;
  n.debate.learn=learn;
  saveNote(n); render();
}
async function sendSalon(){
  const inp = document.getElementById("salonInput");
  const text=(inp?inp.value:"").trim();
  if(!text || S.salonBusy) return;
  const n=S.note;
  n.debate.transcript.push({role:"me", content:text});
  if(!n.debate.learn && !n.debate.userSide) n.debate.userSide = text;
  if(inp) inp.value="";
  S.salonBusy=true;
  S.heat=Math.min(1, .65 + n.debate.transcript.filter(m=>m.role!=="cross").length*.03 + Math.min(text.length/600,.15));
  render();
  try{
    const sys = debateContext(n, relevantSealed(n));
    // history: system framing + every prior exchange, EXCLUDING floor-cross markers
    // (they are stage directions, not messages — sending them breaks role alternation)
    const prior = n.debate.transcript.filter(m=>m.role!=="cross").slice(0,-1);
    const history = [{role:"user",content:sys},{role:"assistant",content:"Understood. The chair is taken."},
      ...prior.map(m=>({role:m.role==="me"?"user":"assistant",content:m.content}))];
    const raw = await api(text, 700, history);
    n.debate.transcript.push({role:"them", content:raw});
    
    await saveNote(n);
  }catch(e){
    n.debate.transcript.push({role:"them", content:"(the fire dipped — say that again)"});
    toast(friendly(e));
  }
  S.salonBusy=false; render();
}

async function enterMine(n){
  if(!n.descent) n.descent={rungs:[],struck:false,closing:""};
  S.note=n; setRoom("mine");
  if(n.descent.rungs.length===0 && !n.descent.struck) await digDeeper(false);
}
async function digDeeper(animate=true){
  const n=S.note;
  if(!n||S.mineBusy||n.descent.struck) return;
  S.mineBusy=true; S.error="";
  if(animate){ const vp=document.querySelector(".mineViewport"); if(vp){ vp.classList.add("dropping"); await new Promise(r=>setTimeout(r,650)); } }
  render();
  try{
    const r = await apiJSON(rungPrompt(n), 1400);
    if(r.struck){ n.descent.struck=true; n.descent.closing=r.closing||"Bedrock."; }
    else if(r.rung){ n.descent.rungs.push({text:String(r.rung), sealedWord:null}); }
    await saveNote(n);
  }catch(e){ S.error = friendly(e); }
  S.mineBusy=false;
  document.body.className="room-mine d"+Math.min(n.descent.rungs.length,3);
  render();
  setTimeout(()=>{ window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"}); },150);
}

  /* the mine's atmosphere follows where you are, not how deep you've been */
function mineScrollWatch(){
  if(S.view!=="mine") return;
  const rows=[...document.querySelectorAll("[data-depth]")];
  if(!rows.length) return;
  const mid=window.innerHeight*0.42;
  let best=rows[0], bestD=1e9;
  rows.forEach(r=>{ const b=r.getBoundingClientRect(); const d=Math.abs((b.top+b.height/2)-mid); if(d<bestD){bestD=d;best=r;} });
  const depth=Math.min(parseInt(best.dataset.depth||"0",10),3);
  document.body.className="room-mine d"+depth;
  const g=document.querySelector(".mineGlow");
  if(g) g.style.height=(34+depth*7)+"vh";
}

function renderSalon(){
  const n=S.note; if(!n||!n.debate) return renderHall();
  const author = n.debate.mode==="author";
  const T=n.debate.transcript;
  const spoken=T.filter(m=>m.role!=="cross").length;
  let seen=0;
  const rows = T.map(m=>{
    if(m.role==="cross") return `<div class="floorCross">${esc(m.content)}</div>`;
    seen++;
    const heat="heat"+Math.min(Math.max(spoken-seen,0),4);
    return `<div class="turn ${m.role==="me"?"me":"them"} ${heat}">
      <div class="speaker">${m.role==="me"?"You":(author?esc(n.source.author||"The author"):(n.debate.learn?"Learning partner":"Debate partner"))} <span class="ln"></span></div>
      <p>${esc(m.content)}</p></div>`;
  }).join("");
  return topBar("The Salon", n.debate.learn?"· learn ·":"· debate ·")+`
<div class="salon${n.debate.learn?" wine":""}" style="display:flex;flex-direction:column;flex:1">
<div class="salonHead">
      <div class="who">Pour yourself a glass.</div>
      <div class="rule"></div>
    </div>
    <div class="pourLabel">${n.debate.learn?"Wine":"Whiskey"}</div>
    <div class="libToggle emojiToggle" style="margin:6px auto 0">
      <button class="${!n.debate.learn?"on":""}" onclick="setSalonMode(false)">🥃</button>
      <button class="${n.debate.learn?"on":""}" onclick="setSalonMode(true)">🍷</button>
    </div>
    <div class="transcript">
     ${T.length===0?`<p class="emptyRoom">${n.debate.learn?"ask anything… no question is too small here":"start the debate… Fire away… "}</p>`:""}
      ${rows}
      ${S.salonBusy?`<div class="turn them heat0"><div class="speaker">${author?esc(n.source.author||"The author"):(n.debate.learn?"Learning partner":"Debate partner")} <span class="ln"></span></div><p style="opacity:.55">…</p></div>`:""}
    </div>
    <div class="salonInputRow" style="position:relative">
      ${n.debate.learn?`<div class="ripple"></div>`:""}
      <textarea id="salonInput" class="salonInput" rows="1" placeholder="${n.debate.learn?"What is it you wish to understand… ":"Speak your mind freely… "}"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendSalon();}"></textarea>
      <button class="sendBtn" onclick="sendSalon()">Send</button>
    </div>
    <div class="salonFoot">
      <button class="ghost" onclick="openSeal()">Seal &amp; Save</button>
      <button class="ghost" onclick="setRoom('obs')">Back to the chart</button>
    </div>
  </div>`;
}
/* ---- MINE ---- */
function renderMine(){
  const n=S.note; if(!n||!n.descent) return renderHall();
  const d=n.descent;
  const ROMAN=["I","II","III","IV","V","VI","VII","VIII","IX","X"];
  return topBar("The Mine","· descend ·")+`
  <div class="mine mineWrap" style="display:flex;flex-direction:column;flex:1">
    <div class="handoff">you have left the source — descending the idea itself</div>
    <div class="mineViewport">
      <div class="stratum past" data-depth="0">
        <div class="lv"><span>Surface</span><span>0</span></div>
        <div class="tx">${esc(n.text)}</div>
        ${n.sealedWord?`<div class="inkw">${esc(n.sealedWord)}</div>`:""}
      </div>
      ${d.rungs.map((r,i)=>`
        <div class="stratum ${i===d.rungs.length-1&&!d.struck?"current":"past"}" data-depth="${Math.min(i+1,3)}">
          <div class="lv"><span>Another floor deeper</span><span>–${ROMAN[i]||i+1}</span></div>
          <div class="tx">${esc(r.text)}</div>
          ${r.sealedWord?`<div class="inkw">${esc(r.sealedWord)}</div>`:""}
        </div>`).join("")}
      ${d.struck?`<div class="goldSeam" data-depth="3"><div class="lv">You've struck gold</div><div class="tx">${esc(d.closing)}</div></div>`:""}
    </div>
    ${S.mineBusy?`<p class="loadingLine">You are descending. Deeper mines hold rarer gems…</p>`:""}
    ${S.error?`<p class="err">${esc(S.error)}</p>`:""}
    <div class="actions two" style="margin-top:auto">
      ${d.struck?`<button class="act" onclick="setRoom('obs')">Back to the chart</button>`:`<button class="act" onclick="digDeeper()" ${S.mineBusy?"disabled":""}>Dig deeper</button>`}
      <button class="act primary" onclick="openSeal()">Seal &amp; Save</button>
    </div>
    <div class="depthNote">You are one step closer to striking gold</div>
  </div>`;
}
/* ---- LIBRARY ---- */
let srcCache=[];
function renderLibrary(unresolvedOnly){
  const bg = "#131010";
  let notes = S.notes.slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(unresolvedOnly) notes = notes.filter(n=>!n.clarify && !n.sealedWord && !(n.debate&&n.debate.transcript.length));
  const sealed = notes.filter(n=>n.sealedWord);
  const unsealed = notes.filter(n=>!n.sealedWord);
  const paper = n => `
    <div class="paper ${n.sealedWord?"":"unsealed"}" style="--pgbg:${bg}" onclick="openNote('${n.id}')">
      <div class="src"><span>${esc(n.source?n.source.title+(n.source.author?" · "+n.source.author:""):"loose note")}</span>
        <span>${n.bothSides?"◐ both sides":""}</span></div>
      <div class="tx">${esc(n.text)}</div>
      ${n.sealedWord?`<div class="inkline"><small>my word</small>${esc(n.sealedWord)}</div>`:""}
    </div>`;
  const srcMap={};
  S.notes.forEach(n=>{ if(n.source&&n.source.title){ const k=n.source.title+"|"+(n.source.author||"");
    if(!srcMap[k]) srcMap[k]={title:n.source.title,author:n.source.author||"",type:n.source.type||"book",count:0,reading:"finished"};
    srcMap[k].count++; if(n.source.reading==="now") srcMap[k].reading="now"; } });
  const looseCount=S.notes.filter(n=>!n.source).length;
  srcCache=Object.values(srcMap).sort((a,b)=>b.count-a.count);
  return topBar(unresolvedOnly?"Unresolved":"The Library","· pages ·")+`
  <div style="display:flex;flex-direction:column;flex:1">
    ${unresolvedOnly?"":`<div class="libToggle">
      <button class="${S.libTab==="notes"?"on":""}" onclick="S.libTab='notes';render()">Notes</button>
      <button class="${S.libTab==="sources"?"on":""}" onclick="S.libTab='sources';render()">Sources</button>
    </div>`}
    ${unresolvedOnly ? (
      notes.length? notes.map(paper).join("") : `<p class="emptyRoom">nothing waiting — every page has had its evening</p>`
    ) : S.libTab==="notes" ? `
      ${notes.length===0?`<p class="emptyRoom">the library is empty —<br>bring it one for the books</p>`:""}
      <button onclick="S.libSeal = S.libSeal==='sealed'?'unsealed':'sealed'; render()"
        style="display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;
               font-family:var(--sans);font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;
               color:#C9A96A;margin:14px 4px 12px;padding:6px 0">
        ${S.libSeal==="sealed"?"Sealed":"Unsealed"}
        <span style="font-size:11px;opacity:.75">⇄</span>
      </button>
      ${(S.libSeal==="sealed"?sealed:unsealed).length
        ? (S.libSeal==="sealed"?sealed:unsealed).map(paper).join("")
        : `<p class="emptyRoom">${S.libSeal==="sealed"?"nothing sealed yet —<br>the ink is waiting":"nothing unsealed —<br>the house is caught up"}</p>`}
    ` : `
      ${srcCache.length===0&&!looseCount?`<p class="emptyRoom">no sources yet — they arrive with the notes</p>`:""}
      ${srcCache.map((s,i)=>`
        <div class="srcRow">
          <div class="t"><div class="name">${esc(s.title)}</div>
          <div class="meta">${esc(s.author||s.type)} · ${s.count} note${s.count>1?"s":""}</div></div>
          ${s.type==="book"?`<button class="pill ${s.reading==="now"?"":"off"}" onclick="toggleReadingIdx(${i})">${s.reading==="now"?"reading now":"finished"}</button>`:""}
        </div>`).join("")}
      ${looseCount?`<div class="srcRow"><div class="t"><div class="name">Loose notes</div><div class="meta">${looseCount} note${looseCount>1?"s":""} · no fixed address</div></div></div>`:""}
    `}
    <div class="libFoot">
      <button class="ghost" onclick="exportBackup()">Export backup</button>
      <button class="ghost" onclick="document.getElementById('importInput').click()">Import</button>
      <button class="ghost" onclick="openKeyModal()">⚿ key</button>
    </div>
  </div>`;
}
function toggleReadingIdx(i){
  const s=srcCache[i]; if(!s) return;
  const next = s.reading==="now"?"finished":"now";
  S.notes.forEach(n=>{ if(n.source&&n.source.title===s.title&&(n.source.author||"")===s.author){ n.source.reading=next; idb.put(JSON.parse(JSON.stringify(n))).catch(()=>{}); } });
  render();
}
/* ---- SKY ---- */
function renderSky(){
  const notes = S.notes.filter(n=>n.text);
  if(!notes.length) return topBar("The Night Sky","· connections ·")+`<p class="emptyRoom">the sky is waiting for its first star</p>`;
  const W=400,H=640;
  const idx = new Map(notes.map((n,i)=>[n.id,i]));

  // edges from shared tags
  const E=[];
  for(let i=0;i<notes.length;i++) for(let j=i+1;j<notes.length;j++){
    const A=notes[i].tags||[],B=notes[j].tags||[];
    const shared=A.filter(t=>B.includes(t)).length;
    if(shared) E.push({a:i,b:j,w:shared,tension:!!(notes[i].bothSides||notes[j].bothSides)});
  }
  // force-directed relaxation — connected notes cluster, unconnected drift apart (engram behaviour)
  const P = notes.map((n,i)=>{ const a=i*2.399963, r=40+16*Math.sqrt(i); return {x:W/2+r*Math.cos(a), y:H*0.44+r*Math.sin(a)}; });
  for(let step=0;step<220;step++){
    for(let i=0;i<P.length;i++) for(let j=i+1;j<P.length;j++){
      let dx=P[j].x-P[i].x, dy=P[j].y-P[i].y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const rep=1400/(d*d); dx/=d; dy/=d;
      P[i].x-=dx*rep; P[i].y-=dy*rep; P[j].x+=dx*rep; P[j].y+=dy*rep;
    }
    for(const e of E){
      let dx=P[e.b].x-P[e.a].x, dy=P[e.b].y-P[e.a].y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const att=(d-70)*0.012*Math.min(e.w,3); dx/=d; dy/=d;
      P[e.a].x+=dx*att; P[e.a].y+=dy*att; P[e.b].x-=dx*att; P[e.b].y-=dy*att;
    }
    for(const p of P){ p.x+=(W/2-p.x)*0.004; p.y+=(H*0.44-p.y)*0.004; }
  }
  const M=44;
  const xs=P.map(p=>p.x), ys=P.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const sc=Math.min((W-M*2)/Math.max(maxX-minX,1),(H-M*2-70)/Math.max(maxY-minY,1),1.6);
  P.forEach(p=>{ p.x=M+(p.x-minX)*sc; p.y=M+(p.y-minY)*sc; });

  const sealedSorted = notes.filter(n=>n.sealedWord).sort((a,b)=>(a.sealedAt||a.createdAt)-(b.sealedAt||b.createdAt));
  const polaris = sealedSorted[0]||null;
  const sel = S.skySel ? notes.find(n=>n.id===S.skySel) : null;
  const selI = sel ? idx.get(sel.id) : -1;
  const near = new Set();
  if(sel) E.forEach(e=>{ if(e.a===selI) near.add(e.b); if(e.b===selI) near.add(e.a); });

 // greedy collision avoidance: try slots around the star, take the first that's free
  const taken=[];
  const free=(x,y,w)=>!taken.some(t=>Math.abs(t.x-x)<(t.w+w)/2+4 && Math.abs(t.y-y)<11);
  const label = (n,i)=>{
    const t=String(n.sealedWord||n.text).slice(0,16);
    const txt=esc(t)+(String(n.sealedWord||n.text).length>16?"…":"");
    const w=t.length*4.6;
    const slots=[[0,-11],[0,17],[0,-19],[0,25],[w/2+8,3],[-w/2-8,3]];
    for(const [dx,dy] of slots){
      const x=P[i].x+dx, y=P[i].y+dy;
      if(free(x,y,w)){ taken.push({x,y,w});
        return `<text x="${x}" y="${y}" text-anchor="middle" style="font-size:7.5px;letter-spacing:.06em;fill:${n.sealedWord?"#E7CE96":"#8892A6"};text-transform:uppercase;paint-order:stroke;stroke:#0B0E1A;stroke-width:3px">${txt}</text>`;
      }
    }
    return ""; // genuinely no room — zoom in to read it
  };

  return topBar("The Night Sky","· connections ·")+`
  <div class="skyWrap">
    <svg viewBox="0 0 ${W} ${H}" id="skySvg" style="touch-action:none">
      <g id="skyG" transform="translate(${S.skyPan.x},${S.skyPan.y}) scale(${S.skyZoom})">
      ${Array.from({length:30},(_,i)=>{const x=(i*137)%W,y=(i*211)%(H-140)+10;return `<circle cx="${x}" cy="${y}" r="${(i%3)*0.3+0.6}" fill="#39404E"/>`;}).join("")}
      ${E.map(e=>{
        const dim = sel && !(e.a===selI||e.b===selI);
        const col = e.tension ? "157,139,212" : "231,206,150";
        return `<line x1="${P[e.a].x}" y1="${P[e.a].y}" x2="${P[e.b].x}" y2="${P[e.b].y}" stroke="rgba(${col},${dim?0.09:0.45})" stroke-width="${Math.min(e.w,3)*0.8}" ${e.tension?'stroke-dasharray="2 5"':""}/>`;
      }).join("")}
      ${notes.map((n,i)=>{
        const dim = sel && i!==selI && !near.has(i);
        return `<g onclick="skyTap('${n.id}')" style="cursor:pointer;opacity:${dim?0.3:1}">
          ${polaris&&n.id===polaris.id?`<circle cx="${P[i].x}" cy="${P[i].y}" r="10" fill="none" stroke="rgba(231,206,150,.3)"/>`:""}
          ${i===selI?`<circle cx="${P[i].x}" cy="${P[i].y}" r="13" fill="none" stroke="rgba(231,206,150,.6)"/>`:""}
          <circle cx="${P[i].x}" cy="${P[i].y}" r="${n.sealedWord?4.4:2.6}" fill="${n.sealedWord?"#E7CE96":"#8D93A0"}"/>
          ${label(n,i)}
        </g>`;
      }).join("")}
      </g>
    </svg>
  </div>
  <div class="skyCap" style="display:flex;gap:8px;justify-content:center;align-items:center;padding-bottom:70px">
    <button class="ghost" onclick="skyZoom(-1)">–</button>
    <span>${sel?esc(String(sel.sealedWord||sel.text).slice(0,30)):"tap a star"}</span>
    <button class="ghost" onclick="skyZoom(1)">+</button>
    ${sel?`<button class="ghost" onclick="openNote('${sel.id}')">open</button><button class="ghost" onclick="S.skySel=null;render()">✕</button>`:""}
  </div>`;
}
function skyTap(id){ S.skySel = (S.skySel===id)?null:id; render(); }
function skyZoom(dir){
  const z = Math.max(0.6, Math.min(3, S.skyZoom * (dir>0?1.35:1/1.35)));
  const cx=200, cy=320;
  S.skyPan = { x: cx - (cx - S.skyPan.x) * (z/S.skyZoom), y: cy - (cy - S.skyPan.y) * (z/S.skyZoom) };
  S.skyZoom = z; render();
}
/* ---------------- boot ---------------- */
(async function boot(){
  try{ await idb.open(); S.notes=(await idb.all()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); }catch(e){}
  document.body.className="room-hall";
  render();
  if(!S.key) openKeyModal();
})();
</script>
</body>
