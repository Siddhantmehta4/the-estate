<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Estate">
<meta name="theme-color" content="#0C0908">
<link rel="manifest" href='data:application/manifest+json,{"name":"The Estate","short_name":"Estate","display":"standalone","background_color":"%230C0908","theme_color":"%230C0908","start_url":"."}'>
<title>The Estate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,450;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=La+Belle+Aurore&family=IM+Fell+English:ital@0;1&display=swap');
:root{
  --night:#141010;--amber:#D9A441;--brass:#C9A96A;--steel:#9FB6BE;--violet:#9D8BD4;
  --ivory:#F3EAD8;--ink:#2B2620;--inkblue:#26324F;--dim:#6B615A;
  --serif:'Fraunces',Georgia,serif;--sans:'Inter',-apple-system,system-ui,sans-serif;
  --hand:'La Belle Aurore',cursive;--fell:'IM Fell English',Georgia,serif;
  --heat:0.7;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{margin:0;min-height:100%;}
body{font-family:var(--sans);color:var(--ivory);background:#0C0908;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));min-height:100vh;transition:background 1.2s ease}
body.room-hall{background:radial-gradient(340px 260px at 50% 34%, rgba(217,164,65,.18) 0%, transparent 70%),linear-gradient(180deg,#1B1512 0%, #141110 55%, #0D0A09 100%)}
body.room-obs{background:linear-gradient(180deg,#0C1018 0%, #0B0E14 55%, #0A0B0F 100%)}
body.room-salon{background:radial-gradient(300px 200px at 16% 0%, rgba(217,164,65,.12) 0%, transparent 60%),linear-gradient(180deg,#261610 0%, #2B1810 45%, #331B0F 100%)}
body.room-mine{background:linear-gradient(180deg,#151110 0%, #100D0C 30%, #0B0908 58%, #070506 100%)}
body.room-mine.d1{background:linear-gradient(180deg,#121010 0%, #0D0B0A 30%, #090707 58%, #060404 100%)}
body.room-mine.d2{background:linear-gradient(180deg,#100E0E 0%, #0B0909 30%, #070606 58%, #050303 100%)}
body.room-mine.d3{background:linear-gradient(180deg,#0D0C0C 0%, #090808 30%, #060505 58%, #040202 100%)}
body.room-lib{background:radial-gradient(400px 260px at 50% 0%, rgba(240,214,150,.06), transparent 70%),linear-gradient(180deg,#171110 0%, #131010 55%, #0E0C0B 100%)}
body.room-sky{background:linear-gradient(180deg,#0B0E1A 0%, #0C0D16 55%, #100D0C 100%)}
#app{max-width:560px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 20px 40px;min-height:92vh;display:flex;flex-direction:column;position:relative;z-index:2}
.topRow{display:flex;align-items:center;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:8px;position:relative;z-index:30}
.topRow .roomName{cursor:pointer}
.topRow .mid{margin-left:auto;margin-right:14px}
.menuBtn{color:rgba(201,169,106,.8);font-size:16px;line-height:1;cursor:pointer;background:none;border:none;padding:4px 6px}
.menuPanel{position:absolute;top:34px;right:0;z-index:40;background:rgba(16,12,10,.97);border:1px solid rgba(201,169,106,.3);border-radius:12px;padding:8px 0;box-shadow:0 14px 40px rgba(0,0,0,.6);min-width:160px}
.menuPanel button{display:block;width:100%;text-align:left;background:none;border:none;padding:10px 18px;font-family:var(--sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#D8C49A;cursor:pointer}
.menuPanel button.sep{border-top:1px solid rgba(201,169,106,.15);margin-top:4px;padding-top:13px}
.searchWrap{margin:4px 0 14px}
.searchBar{display:flex;align-items:center;border:1px solid rgba(201,169,106,.35);border-radius:12px;padding:11px 14px;background:rgba(0,0,0,.3)}
.searchBar input{flex:1;background:none;border:none;outline:none;font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ivory)}
.searchBar input::placeholder{color:rgba(240,228,200,.4)}
.searchBar .x{color:#8A7259;background:none;border:none;font-size:15px;cursor:pointer;padding:0 2px}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.actions.two{grid-template-columns:repeat(2,1fr)}
.actions.one{grid-template-columns:1fr}
.act{display:flex;align-items:center;justify-content:center;height:46px;border-radius:12px;border:1px solid rgba(201,169,106,.3);font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#D8C49A;background:linear-gradient(180deg, rgba(201,169,106,.07), rgba(201,169,106,.02));cursor:pointer}
.act.primary{border-color:rgba(217,164,65,.6);color:#EBD9AE;box-shadow:0 0 24px rgba(217,164,65,.12)}
.act:disabled{opacity:.45}
button.act{font-family:var(--sans)}
.ghost{background:none;border:none;color:#9C8A6D;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;padding:8px}
.err{color:#C96A50;font-size:13px;margin:12px 0;text-align:center}
.loadingLine{text-align:center;color:#B9AC97;font-style:italic;font-family:var(--serif);font-size:14px;margin:20px 0}
.toast{position:fixed;left:50%;bottom:calc(30px + env(safe-area-inset-bottom));transform:translateX(-50%);background:rgba(20,14,10,.95);border:1px solid rgba(217,164,65,.4);color:#EBD9AE;font-family:var(--serif);font-style:italic;font-size:14px;padding:11px 22px;border-radius:999px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1}}
/* ---- HALL ---- */
.welcome{margin-top:14vh;text-align:center;font-family:var(--serif);font-weight:450;font-size:26px;color:#F0E4C8;text-shadow:0 0 34px rgba(217,164,65,.25)}
.captureBar{margin-top:30px;border:1px solid rgba(217,164,65,.45);border-radius:16px;background:rgba(0,0,0,.3);padding:16px 16px 12px;box-shadow:0 0 60px rgba(217,164,65,.14)}
.captureBar textarea{width:100%;background:none;border:none;outline:none;resize:none;font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.5;color:var(--ivory);min-height:56px}
.captureBar textarea::placeholder{color:rgba(240,228,200,.42)}
.captureBar .modes{display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9C8A6D}
.captureBar .modes button{background:none;border:none;color:#9C8A6D;font-size:10px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;padding:0}
.hall .actions{margin-top:24px}
.hallFoot{margin-top:auto;text-align:center;padding-top:40px}
/* ---- OBSERVATORY ---- */
.chartBg{position:fixed;inset:0;opacity:.5;pointer-events:none;z-index:0}
.chartBg svg{width:100%;height:100%}
.chartBg path{fill:none;stroke:rgba(159,182,190,.09);stroke-width:1}
.obsQuote{font-family:var(--serif);font-weight:450;font-size:20px;line-height:1.55;color:#ECF2F2;margin-top:26px;text-shadow:0 0 34px rgba(159,182,190,.3);white-space:pre-wrap}
.obsQuote:first-letter{color:#E3CD9A}
.obsRule{display:flex;align-items:center;gap:12px;margin:20px 0 12px}
.obsRule .line{flex:1;height:1px;background:linear-gradient(90deg, rgba(201,169,106,.5), transparent)}
.obsRule .star{color:var(--brass);font-size:11px}
.obsSrc{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:#8E9CA2;cursor:pointer}
.obsClarify{font-size:14px;line-height:1.72;color:#C2CDCF;white-space:pre-wrap}
.footnote{font-size:11.5px;font-style:italic;color:#7E8C92;margin-top:12px}
.obsFooting{display:flex;align-items:center;gap:8px;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:rgba(159,182,190,.7);margin-top:16px;justify-content:center}
.obsFooting i{width:6px;height:6px;border-radius:50%;background:var(--brass);box-shadow:0 0 10px var(--brass)}
.obs .actions{margin-top:26px}
.obs .act{border-color:rgba(159,182,190,.3);color:#BFD0D4}
.obs .act.primary{border-color:rgba(201,169,106,.55);color:#E3CD9A}
.sealedBlock{margin-top:22px;border-top:1px solid rgba(201,169,106,.25);padding-top:14px}
.sealedBlock small{display:block;font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:#8A7452;margin-bottom:4px}
.sealedBlock .inkw{font-family:var(--hand);font-size:22px;line-height:1.35;color:#B9C4E8}
/* ---- SALON ---- */
.hearthGlow{position:fixed;left:0;right:0;bottom:0;height:44vh;pointer-events:none;z-index:0;
  background:radial-gradient(60% 90% at 50% 108%, rgba(255,166,80,calc(.36*var(--heat))) 0%, rgba(235,130,55,calc(.18*var(--heat))) 42%, transparent 72%);
  transition:opacity 2s ease;animation:hearthB 5s ease-in-out infinite}
@keyframes hearthB{0%,100%{opacity:1}50%{opacity:.8}}
.salonHead{text-align:center;margin:6px 0 2px}
.salonHead .who{font-family:var(--serif);font-size:16px;letter-spacing:.13em;color:#EDD3A0}
.salonHead .sub{font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:#A08363;margin-top:5px}
.sideToggle{display:flex;justify-content:center;margin:12px auto 0;border:1px solid rgba(217,164,65,.35);border-radius:999px;overflow:hidden;width:fit-content}
.sideToggle button{font-family:var(--sans);font-size:9px;letter-spacing:.16em;text-transform:uppercase;padding:8px 14px;color:#A08363;background:none;border:none;cursor:pointer}
.sideToggle button.on{background:rgba(217,164,65,.18);color:#F0DCAE}
.transcript{flex:1;margin-top:16px;padding-bottom:8px}
.turn{margin-bottom:20px}
.turn .speaker{display:flex;align-items:center;gap:12px;font-size:9px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:7px}
.turn .speaker .ln{flex:1;height:1px;background:rgba(217,164,65,.16)}
.turn.them .speaker{color:#C29A64}
.turn.me .speaker{color:#E7B953}
.turn p{margin:0;font-family:var(--serif);font-size:15px;line-height:1.66;white-space:pre-wrap}
.heat0 p{color:#F7E9C6}.heat1 p{color:#E9D2A6}.heat2 p{color:#D7BC8F}.heat3 p{color:#C3A87E}.heat4 p{color:#B0966F}
.floorCross{text-align:center;font-family:var(--serif);font-style:italic;font-size:12px;color:rgba(230,180,90,.75);margin:6px 0 18px}
.salonInputRow{position:sticky;bottom:0;background:transparent;padding:8px 0 4px;display:flex;gap:10px;align-items:flex-end}
.salonInput{flex:1;border:none;border-bottom:1px solid rgba(217,164,65,.5);background:none;outline:none;font-family:var(--serif);font-style:italic;font-size:15px;color:#F5E8C8;padding:10px 2px;resize:none;min-height:20px}
.salonInput::placeholder{color:rgba(240,220,180,.42)}
.sendBtn{background:none;border:none;color:var(--amber);font-size:10px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;padding:10px 4px;font-family:var(--sans)}
.salonFoot{display:flex;justify-content:center;gap:8px;margin-top:10px}
/* ---- MINE ---- */
.mineCols:before,.mineCols:after{content:"";position:fixed;top:0;bottom:0;width:24px;z-index:0;
  background:repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 2px, rgba(0,0,0,.15) 2px 6px, rgba(255,255,255,.02) 6px 8px)}
.mineCols:before{left:0}.mineCols:after{right:0}
.mineGlow{position:fixed;left:0;right:0;bottom:0;pointer-events:none;z-index:0;height:46vh;
  background:radial-gradient(52% 60% at 50% 106%, rgba(217,164,65,.34) 0%, transparent 58%),radial-gradient(90% 90% at 50% 112%, rgba(157,139,212,.26) 0%, rgba(157,139,212,.08) 50%, transparent 78%);
  animation:glowB 6s ease-in-out infinite;transition:height 1s ease, opacity 1s ease}
@keyframes glowB{0%,100%{opacity:1}50%{opacity:.78}}
.handoff{font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:#8B7B60;margin:10px 0 20px;text-align:center}
.mineViewport{transition:transform .7s cubic-bezier(.5,0,.3,1), opacity .7s ease}
.mineViewport.dropping{transform:translateY(-44px);opacity:0}
.stratum{margin:0 6px 18px;padding:13px 16px;border-left:1px solid rgba(255,255,255,.14);animation:strataIn .6s ease}
@keyframes strataIn{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
.stratum .lv{font-size:8.5px;letter-spacing:.26em;text-transform:uppercase;color:#7A6C5C;margin-bottom:5px;display:flex;justify-content:space-between}
.stratum .tx{font-family:var(--serif);font-size:14px;line-height:1.6;color:#C4B7A2;white-space:pre-wrap}
.stratum.past{opacity:.5}
.stratum.current{border-left-color:rgba(157,139,212,.55)}
.stratum.current .tx{color:#E4D7BE}
.stratum .inkw{font-family:var(--hand);font-size:18px;color:#B9A7E0;margin-top:6px}
.goldSeam{margin:26px 6px 12px;text-align:center;padding-top:16px;position:relative;animation:strataIn .8s ease}
.goldSeam:before{content:"";position:absolute;left:6%;right:6%;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(217,164,65,.85),transparent);box-shadow:0 0 24px rgba(217,164,65,.7)}
.goldSeam .lv{font-size:9px;letter-spacing:.32em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.goldSeam .tx{font-family:var(--serif);font-size:14.5px;line-height:1.6;color:#F2E4B8;text-shadow:0 0 22px rgba(217,164,65,.3)}
.mine .actions{margin:14px 6px 8px}
.mine .act{border-color:rgba(157,139,212,.35);color:#CBBFA6}
.mine .act.primary{border-color:rgba(217,164,65,.6);color:#EBD9AE}
.depthNote{text-align:center;font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;color:rgba(157,139,212,.55);margin:6px 0 14px}
/* ---- LIBRARY ---- */
.libToggle{display:flex;justify-content:center;margin:8px auto 16px;border:1px solid rgba(201,169,106,.3);border-radius:999px;overflow:hidden;width:fit-content}
.libToggle button{font-family:var(--sans);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;padding:8px 20px;color:#8A7259;background:none;border:none;cursor:pointer}
.libToggle button.on{background:rgba(217,164,65,.14);color:#EBD9AE}
.shelfLabel{font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;color:#7A6C5C;margin:14px 4px 12px}
.paper{position:relative;border-radius:2px;padding:14px 16px 12px;margin:0 2px 16px;cursor:pointer;
  background:radial-gradient(140% 100% at 20% 0%, rgba(255,255,255,.5), transparent 42%),repeating-linear-gradient(0deg, rgba(120,96,60,.035) 0 1px, transparent 1px 3px),linear-gradient(160deg,#F6EEDC 0%, #EFE3CB 60%, #E7D8BC 100%);
  box-shadow:0 6px 20px rgba(0,0,0,.5);color:var(--ink)}
.paper:nth-child(odd){transform:rotate(-.4deg)}
.paper:nth-child(even){transform:rotate(.35deg)}
.paper .src{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:#8A7452;display:flex;justify-content:space-between;gap:8px;margin-bottom:7px}
.paper .tx{font-family:var(--fell);font-size:14.5px;line-height:1.5;color:#33291F;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.paper .inkline{margin-top:9px;padding-top:8px;border-top:1px solid rgba(120,96,60,.25);font-family:var(--hand);font-size:19px;line-height:1.3;color:var(--inkblue)}
.paper .inkline small{display:block;font-family:var(--sans);font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:#8A7452;margin-bottom:2px}
.paper.unsealed:before{content:"";position:absolute;top:0;right:0;border-style:solid;border-width:0 26px 26px 0;border-color:transparent;border-right-color:var(--pgbg,#131010);z-index:2}
.paper.unsealed:after{content:"";position:absolute;top:0;right:0;width:26px;height:26px;background:linear-gradient(225deg, transparent 48%, #D8C8A6 50%, #C4B08A 100%);box-shadow:-2px 2px 4px rgba(0,0,0,.18);z-index:1}
.srcRow{display:flex;align-items:center;gap:12px;padding:14px 6px;border-bottom:1px solid rgba(201,169,106,.12)}
.srcRow .t{flex:1}
.srcRow .name{font-family:var(--serif);font-size:16px;color:#EADCC0}
.srcRow .meta{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8A7B65;margin-top:3px}
.srcRow .pill{font-family:var(--sans);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;border:1px solid rgba(217,164,65,.4);color:#E3CD9A;border-radius:999px;padding:5px 10px;background:none;cursor:pointer}
.srcRow .pill.off{border-color:rgba(255,255,255,.15);color:#8A7B65}
.libFoot{margin-top:auto;padding-top:26px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.emptyRoom{text-align:center;color:#8F8377;font-family:var(--serif);font-style:italic;font-size:15px;margin-top:60px;line-height:1.7}
/* ---- SKY ---- */
.skyWrap{position:relative;flex:1;min-height:70vh}
.skyWrap svg{position:absolute;inset:0;width:100%;height:100%}
.roofSil{position:fixed;bottom:calc(14px + env(safe-area-inset-bottom));left:0;right:0;height:56px;pointer-events:none}
.roofSil .house{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:170px;height:32px;background:#070505}
.roofSil .gable{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:52px solid transparent;border-right:52px solid transparent;border-bottom:30px solid #070505}
.roofSil .chimney{position:absolute;bottom:42px;left:50%;margin-left:34px;width:12px;height:26px;background:#070505}
.roofSil .window{position:absolute;bottom:9px;left:50%;margin-left:-9px;width:18px;height:12px;background:rgba(255,214,120,.7);box-shadow:0 0 16px rgba(255,206,110,.5)}
/* ---- modal / seal ---- */
.modal{position:fixed;inset:0;background:rgba(10,7,6,.8);display:flex;align-items:center;justify-content:center;z-index:90;padding:22px}
.modalCard{background:linear-gradient(180deg,#1D1613,#151010);border:1px solid rgba(201,169,106,.35);border-radius:18px;padding:26px 22px;max-width:440px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modalCard h3{font-family:var(--serif);font-weight:450;font-size:21px;margin:0 0 8px;color:#F0E4C8}
.modalCard p{font-size:13px;line-height:1.65;color:#B7A992;margin:0 0 14px}
.modalCard textarea,.modalCard input{width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(201,169,106,.3);border-radius:10px;padding:12px 13px;font-family:var(--hand);font-size:20px;color:#C6D0EE;outline:none;resize:vertical}
.modalCard input{font-family:var(--sans);font-size:14px;color:var(--ivory)}
.modalRow{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
.chipBtn{font-family:var(--sans);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;padding:11px 16px;border-radius:10px;cursor:pointer;background:linear-gradient(180deg, rgba(217,164,65,.85), rgba(180,130,45,.85));border:none;color:#1C1206;font-weight:600}
.chipBtn.quiet{background:none;border:1px solid rgba(201,169,106,.3);color:#C9B58C;font-weight:500}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body class="room-hall">
<div id="fx"></div>
<div id="app"></div>
<div id="modalMount"></div>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="importInput" accept="application/json" style="display:none">

<script>
/* ============================================================
   THE ESTATE — a house for the lines that stop you
   Local-first PWA · BYOK · six rooms, one night
   Inviolable: the sovereign seal · footing honesty · the AI
   speaks in three places · debate opposes YOU · rung by rung.
   ============================================================ */
const MODEL = "claude-sonnet-4-6"; // understanding is generated here — use the strongest model your key allows
const S = {
  view:"hall", key:localStorage.getItem("estate-key")||"",
  notes:[], note:null,            // note = current open note object
  loading:false, error:"",
  libTab:"notes", search:null,    // search = query string or null
  menuOpen:false, lastWelcome:localStorage.getItem("estate-welcome")||"",
  mineBusy:false, salonBusy:false, heat:0.7,
};
/* ---------------- utils ---------------- */
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const uid = () => "n"+Date.now()+Math.floor(Math.random()*999);
const parseJSON = raw => { const c=raw.replace(/```json|```/g,"").trim(); return JSON.parse(c.slice(c.indexOf("{"), c.lastIndexOf("}")+1)); };
function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }
/* ---------------- IndexedDB ---------------- */
const idb = {
  db:null,
  open(){ return new Promise((res,rej)=>{ const r=indexedDB.open("the-estate",1);
    r.onupgradeneeded=()=>{ const d=r.result; if(!d.objectStoreNames.contains("notes")) d.createObjectStore("notes",{keyPath:"id"}); if(!d.objectStoreNames.contains("kv")) d.createObjectStore("kv"); };
    r.onsuccess=()=>{ idb.db=r.result; res(); }; r.onerror=()=>rej(r.error); }); },
  put(note){ return new Promise((res,rej)=>{ const t=idb.db.transaction("notes","readwrite"); t.objectStore("notes").put(note); t.oncomplete=res; t.onerror=()=>rej(t.error); }); },
  del(id){ return new Promise((res)=>{ const t=idb.db.transaction("notes","readwrite"); t.objectStore("notes").delete(id); t.oncomplete=res; t.onerror=res; }); },
  all(){ return new Promise((res)=>{ const r=idb.db.transaction("notes").objectStore("notes").getAll(); r.onsuccess=()=>res(r.result||[]); r.onerror=()=>res([]); }); },
};
async function saveNote(n){ n.updatedAt=Date.now(); try{ await idb.put(n); }catch(e){ S.error="Storage refused — export a backup."; } if(!S.notes.find(x=>x.id===n.id)) S.notes.unshift(n); }
/* ---------------- API ---------------- */
async function api(content, maxTokens, history){
  if(!S.key) throw new Error("no-key");
  const messages = history ? [...history] : [];
  messages.push({role:"user", content});
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{ "Content-Type":"application/json","x-api-key":S.key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body:JSON.stringify({model:MODEL,max_tokens:maxTokens||1200,messages})
  });
  if(!res.ok){ if(res.status===401) throw new Error("The key was refused — check it in the hall."); throw new Error("The house is unreachable ("+res.status+"). Try again."); }
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}
/* ---------------- prompts ---------------- */
const LAW = `THE LAW: only understanding is the goal — a reply succeeds if the person genuinely sees, and fails if it merely sounds deep. Voice is a toolbox, never a template: diagnose what THIS line needs — a market idea needs mechanics, a physical idea needs cause-and-effect, a human idea may earn imagery. Wit is welcome where it genuinely serves. BANNED: fortune-cookie mysticism; "just as X, so too Y"; rhetorical questions pointing nowhere; wisdom-cosplay; vagueness passed off as depth; forced spirituality on technical topics; decoration.`;

function clarifyPrompt(text){
  return `You are the engine of "The Estate", a capture-and-understanding app. A user captured this line (from a book, a song, a film, a conversation, or their own head):

"${text}"

${LAW}

TASKS, in one JSON response:
1. SOURCE: identify the source if you genuinely recognize it. Footing: "known" (you know this text well), "partial" (you know the author/work thinly), "unknown". NEVER confabulate a source. If it reads as a general thought, source is null.
2. CLARIFY: 60–130 words of immediate value — what this line is really saying, what it stands on, what it quietly assumes — IN THE SOURCE'S CONTEXT when known (the line as a move its author is making, never a standalone aphorism). If footing is unknown/partial and no source is given, clarify the idea itself.
3. FOOTNOTE: if speaking without real knowledge of the original text, one honest line, e.g. "answering from relative context, not the original text". Empty string if footing is known.

Respond ONLY with JSON, no fences:
{"source":{"title":"","author":"","type":"book|song|film|speech|conversation|thought|other","footing":"known|partial|unknown"} or null,"looksSourced":false,"clarify":"","footnote":""}`;
}
function clarifyImageContent(){ return `You are the engine of "The Estate", a capture-and-understanding app. The user photographed a page or screen. First transcribe the passage they most plausibly captured (the main highlighted/central text), then do the tasks below on that transcription.

${LAW}

Respond ONLY with JSON, no fences:
{"transcription":"the captured text, verbatim from the image","source":{"title":"","author":"","type":"book|song|film|speech|conversation|thought|other","footing":"known|partial|unknown"} or null,"looksSourced":false,"clarify":"60-130 words, in the source's context when known","footnote":"honest line if footing is not known, else empty"}`; }

function debateContext(n){
  const src = n.source && n.source.title ? `Source: ${n.source.title}${n.source.author?" — "+n.source.author:""} (footing: ${n.source.footing})` : "Source: none — a loose thought.";
  const mode = n.debate.mode;
  const rules = mode==="author"
    ? `MODE — THE AUTHOR'S CHAIR: You are an informed reconstruction of ${n.source.author||"the author"}, speaking first-person, defending this line UNRELENTINGLY from inside your work, biography, and historical moment. You NEVER switch sides and never abandon the text. Concessions are earned only — made where the ground genuinely shakes, historically honest — but you hold the text's side to the end. If your knowledge of the original text is thin, say so honestly once. Under 130 words per reply.`
    : `MODE — THE OPPOSITION: You are a debater whose single loyalty is opposing THE USER'S CURRENT SIDE, which is: "${n.debate.userSide}". Argue the opposite of that side, sharply and fairly. If the user's side changes, your side flips with it — always opposite. Concede ONLY when an argument genuinely lands, never to be polite. Under 120 words per reply.`;
  return `You are the debating voice inside "The Estate", speaking in the salon.

${LAW}

The captured line: "${n.text}"
${src}
${n.clarify?`The house's earlier clarification: ${n.clarify}`:""}

${rules}`;
}
function rungPrompt(n){
  const sealedLib = S.notes.filter(x=>x.id!==n.id && x.sealedWord).slice(0,10)
    .map(x=>`— "${x.text.slice(0,90)}" → their sealed word: "${x.sealedWord}"`).join("\n");
  const strata = (n.descent.rungs||[]).map((r,i)=>`${i+1}. ${r.text}${r.sealedWord?` (sealed by the user as: "${r.sealedWord}")`:""}`).join("\n");
  return `You are the engine of "The Estate", generating one rung of a descent to first principles.

${LAW}

THE RUNG, DEFINED: each rung answers exactly one question — "what does the level above stand on?" Find the load-bearing claim above and expose what must be true for it to hold. Deeper rungs naturally become more exact (mechanism, then science/logic/definition) because that is what reduction converges to.

The idea under descent (the user has left the source's context; this is the idea itself): "${n.text}"
${n.clarify?`Clarified as: ${n.clarify}`:""}
${strata?`\nThe descent so far (the user's sealed words are FINAL and must be built on exactly as written):\n${strata}`:"\nThis is the first rung beneath the surface."}
${sealedLib?`\nTHE DEEP LAW — this user's library (draw on it where it genuinely connects; their descent should be dug through what THEY have owned):\n${sealedLib}`:""}

If the last level already stands on an axiom, a definition, a brute empirical fact, or an honest open question — bedrock — set "struck": true and give "closing" (35–65 words: name the gold struck and the questions that remain; plain, no ceremony).

Respond ONLY with JSON, no fences:
{"rung":"70–120 words — what the level above stands on","struck":false,"closing":""}`;
}
function tagsPrompt(n){
  return `A note in a knowledge app: "${n.text.slice(0,200)}"${n.sealedWord?` — user's own sealed understanding: "${n.sealedWord}"`:""}
Return 2–5 short lowercase concept tags capturing what this note is ABOUT (themes/concepts, not words). ONLY JSON, no fences: {"tags":["..."]}`;
}
/* ---------------- flows ---------------- */
function newNote(text){
  return { id:uid(), text:text.trim(), createdAt:Date.now(), source:null, looksSourced:false,
    clarify:null, footnote:"", footing:null, sealedWord:null, sealedAt:null,
    debate:null, descent:null, tags:[], bothSides:false };
}
async function runClarify(n, imageB64, mime){
  S.loading = true; S.error=""; render();
  try{
    let raw;
    if(imageB64){
      raw = await api([{type:"image",source:{type:"base64",media_type:mime,data:imageB64}},{type:"text",text:clarifyImageContent()}], 1400);
    } else {
      raw = await api(clarifyPrompt(n.text), 1200);
    }
    const r = parseJSON(raw);
    if(r.transcription) n.text = r.transcription;
    n.source = r.source && r.source.title ? r.source : null;
    n.looksSourced = !!r.looksSourced;
    n.clarify = r.clarify||"";
    n.footnote = r.footnote||"";
    n.footing = n.source ? n.source.footing : null;
    await saveNote(n);
    S.note = n; S.view="obs";
  }catch(e){ S.error = e.message==="no-key" ? "The house needs its key — tap 'the key' below." : (e.message||"The chart would not resolve — try again."); }
  S.loading=false; render();
}
async function captureAction(action){
  const ta = document.getElementById("captureText");
  const text = (ta?ta.value:"").trim();
  if(!text) { toast("the bar is empty"); return; }
  if(!S.key && action!=="save"){ openKeyModal(); return; }
  const n = newNote(text);
  if(action==="save"){ await saveNote(n); harvestTags(n); if(ta) ta.value=""; toast("kept — it's in the library"); return; }
  if(action==="resolve"){ await runClarify(n); return; }
  if(action==="debate"){ S.note=n; await saveNote(n);
    // need source knowledge before choosing the chair — quick clarify without showing observatory
    S.loading=true; render();
    try{ const raw = await api(clarifyPrompt(n.text),1200); const r=parseJSON(raw);
      n.source = r.source && r.source.title ? r.source : null; n.clarify=r.clarify||""; n.footnote=r.footnote||""; n.footing=n.source?n.source.footing:null;
      await saveNote(n);
    }catch(e){ S.error=e.message||"The salon door stuck — try again."; S.loading=false; render(); return; }
    S.loading=false; enterSalon(n); return;
  }
}
function enterSalon(n){
  if(!n.debate){
    const authorMode = !!(n.source && n.source.author && (n.source.type==="book"||n.source.type==="speech"||n.source.type==="other") && n.source.footing!=="unknown");
    n.debate = { mode: authorMode?"author":"general", userSide: authorMode? "challenging the text" : `against the line: "${n.text.slice(0,80)}"`, sidePro:false, transcript:[], crossings:0 };
  }
  S.note=n; S.view="salon"; S.heat=.7; render();
}
async function sendSalon(){
  const inp = document.getElementById("salonInput");
  const text=(inp?inp.value:"").trim();
  if(!text || S.salonBusy) return;
  const n=S.note;
  n.debate.transcript.push({role:"me", content:text, side:n.debate.sidePro?"for":"against"});
  if(inp) inp.value="";
  S.salonBusy=true; S.heat=Math.min(1, .65 + n.debate.transcript.length*.03 + Math.min(text.length/600,.15)); render();
  try{
    const sys = debateContext(n);
    const history = [{role:"user",content:sys},{role:"assistant",content:"Understood. The chair is taken."},
      ...n.debate.transcript.map(m=>({role:m.role==="me"?"user":"assistant",content:m.content}))];
    history.pop();
    const raw = await api(text, 700, history);
    n.debate.transcript.push({role:"them", content:raw});
    if(n.debate.mode==="general"){
      const sides = new Set(n.debate.transcript.filter(m=>m.role==="me").map(m=>m.side));
      if(sides.size>1 && !n.bothSides){ n.bothSides=true; toast("◐ both sides — the house's highest mark"); }
    }
    await saveNote(n);
  }catch(e){ n.debate.transcript.push({role:"them", content:"(the fire dipped — say that again)"}); }
  S.salonBusy=false; render();
}
function flipSide(pro){
  const n=S.note;
  if(n.debate.mode!=="general" || n.debate.sidePro===pro) return;
  n.debate.sidePro=pro;
  n.debate.userSide = pro ? `for the line: "${n.text.slice(0,80)}"` : `against the line: "${n.text.slice(0,80)}"`;
  n.debate.transcript.push({role:"cross", content:"— you cross the floor —"});
  n.debate.crossings++;
  saveNote(n); render();
}
async function enterMine(n){
  if(!n.descent) n.descent={rungs:[],struck:false,closing:""};
  S.note=n; S.view="mine"; document.body.className="room-mine d"+Math.min(n.descent.rungs.length,3);
  render();
  if(n.descent.rungs.length===0 && !n.descent.struck) await digDeeper(false);
}
async function digDeeper(animate=true){
  const n=S.note;
  if(S.mineBusy||n.descent.struck) return;
  S.mineBusy=true; S.error="";
  if(animate){ const vp=document.querySelector(".mineViewport"); if(vp) vp.classList.add("dropping"); await new Promise(r=>setTimeout(r,650)); }
  render();
  try{
    const raw = await api(rungPrompt(n), 900);
    const r = parseJSON(raw);
    if(r.struck){ n.descent.struck=true; n.descent.closing=r.closing||"Bedrock."; }
    else n.descent.rungs.push({text:r.rung, sealedWord:null});
    await saveNote(n);
    document.body.className="room-mine d"+Math.min(n.descent.rungs.length,3);
  }catch(e){ S.error = e.message||"The floor held — try again."; }
  S.mineBusy=false; render();
  setTimeout(()=>{ window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"}); },150);
}

    ${n.footnote?`<div class="footnote">※ ${esc(n.footnote)}</div>`:""}
    ${n.sealedWord?`<div class="sealedBlock"><small>my word</small><div class="inkw">${esc(n.sealedWord)}</div></div>`:""}
    ${S.loading?`<p class="loadingLine">the chart is resolving…</p>`:""}
    ${S.error?`<p class="err">${esc(S.error)}</p>`:""}
    <div class="actions" style="margin-top:auto;padding-top:26px">
      <button class="act primary" onclick="enterSalon(S.note)">${n.debate&&n.debate.transcript.length?"Rejoin debate":"Debate"}</button>
      <button class="act" onclick="enterMine(S.note)">${n.descent&&n.descent.rungs.length?"Redescend":"Descend"}</button>
      <button class="act" onclick="openSeal()">Seal &amp; Save</button>
    </div>
    ${footing?`<div class="obsFooting"><i></i> footing · ${esc(footing)}</div>`:""}
  </div>`;
}
async function reResolve(){ const n=S.note; await runClarify(n); }
function editSource(){
  const n=S.note;
  const title=prompt("Source title (leave blank for a loose note):", n.source?n.source.title:"");
  if(title===null) return;
  if(!title.trim()){ n.source=null; n.footing=null; }
  else{
    const author=prompt("Author / artist (optional):", n.source?n.source.author:"")||"";
    n.source={title:title.trim(),author:author.trim(),type:n.source?n.source.type:"book",footing:"partial",reading:n.source?n.source.reading:"now"};
    n.footing="partial";
  }
  saveNote(n); render();
}
/* ---- SALON ---- */
function renderSalon(){
  const n=S.note; if(!n||!n.debate) return renderHall();
  const author = n.debate.mode==="author";
  const T=n.debate.transcript;
  const heatClass = i => "heat"+Math.min(Math.max(T.length-1-i,0),4);
  return topBar("The Salon","· debate ·")+`
  <div class="salon" style="display:flex;flex-direction:column;flex:1">
    <div class="salonHead">
      <div class="who">${author?esc((n.source.author||"THE AUTHOR").toUpperCase()):"THE OPPOSITION"}</div>
      <div class="sub">${author?"reconstruction · defends the text":"always the other side of you"}</div>
    </div>
    ${author?"":`<div class="sideToggle">
      <button class="${!n.debate.sidePro?"on":""}" onclick="flipSide(false)">I'm against it</button>
      <button class="${n.debate.sidePro?"on":""}" onclick="flipSide(true)">I'm for it</button>
    </div>`}
    <div class="transcript">
      ${T.length===0?`<p class="emptyRoom">state your position — the chair is taken, the fire is lit</p>`:""}
      ${T.map((m,i)=> m.role==="cross"
        ? `<div class="floorCross">${esc(m.content)}</div>`
        : `<div class="turn ${m.role==="me"?"me":"them"} ${heatClass(i)}">
            <div class="speaker">${m.role==="me"?("You"+(m.side&&n.debate.mode==="general"?" · "+m.side:"")):(author?esc(n.source.author||"The author"):"The Opposition")} <span class="ln"></span></div>
            <p>${esc(m.content)}</p></div>`).join("")}
      ${S.salonBusy?`<div class="turn them heat0"><div class="speaker">${author?esc(n.source.author||"The author"):"The Opposition"} <span class="ln"></span></div><p style="opacity:.55">…</p></div>`:""}
    </div>
    <div class="salonInputRow">
      <textarea id="salonInput" class="salonInput" rows="1" placeholder="${T.length?"hold your ground…":"state your position…"}"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendSalon();}"></textarea>
      <button class="sendBtn" onclick="sendSalon()">Send</button>
    </div>
    <div class="salonFoot">
      <button class="ghost" onclick="openSeal()">Seal &amp; Save</button>
      <button class="ghost" onclick="setRoom('obs')">Back to the chart</button>
    </div>
  </div>`;
}
/* ---- MINE ---- */
function renderMine(){
  const n=S.note; if(!n||!n.descent) return renderHall();
  const d=n.descent;
  return topBar("The Mine","· descend ·")+`
  <div class="mine" style="display:flex;flex-direction:column;flex:1;padding:0 14px">
    <div class="handoff">you have left the source — descending the idea itself</div>
    <div class="mineViewport">
      <div class="stratum past">
        <div class="lv"><span>Surface</span><span>0</span></div>
        <div class="tx">${esc(n.text)}</div>
        ${n.sealedWord?`<div class="inkw">${esc(n.sealedWord)}</div>`:""}
      </div>
      ${d.rungs.map((r,i)=>`
        <div class="stratum ${i===d.rungs.length-1&&!d.struck?"current":"past"}">
          <div class="lv"><span>Stands on</span><span>–${["I","II","III","IV","V","VI","VII","VIII"][i]||i+1}</span></div>
          <div class="tx">${esc(r.text)}</div>
          ${r.sealedWord?`<div class="inkw">${esc(r.sealedWord)}</div>`:""}
        </div>`).join("")}
      ${d.struck?`<div class="goldSeam"><div class="lv">You've struck gold</div><div class="tx">${esc(d.closing)}</div></div>`:""}
    </div>
    ${S.mineBusy?`<p class="loadingLine">the floor is opening…</p>`:""}
    ${S.error?`<p class="err">${esc(S.error)}</p>`:""}
    <div class="actions two">
      ${d.struck?`<button class="act" onclick="setRoom('obs')">Back to the chart</button>`:`<button class="act" onclick="digDeeper()" ${S.mineBusy?"disabled":""}>Dig deeper</button>`}
      <button class="act primary" onclick="openSeal()">Seal &amp; Save</button>
    </div>
    <div class="depthNote">the glow beneath grows as you near bedrock</div>
  </div>`;
}
/* ---- LIBRARY ---- */
function renderLibrary(unresolvedOnly){
  const bg = "#131010";
  let notes = S.notes.slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  if(unresolvedOnly) notes = notes.filter(n=>!n.clarify && !n.sealedWord && !(n.debate&&n.debate.transcript.length));
  const sealed = notes.filter(n=>n.sealedWord);
  const unsealed = notes.filter(n=>!n.sealedWord);
  const paper = n => `
    <div class="paper ${n.sealedWord?"":"unsealed"}" style="--pgbg:${bg}" onclick="openNote('${n.id}')">
      <div class="src"><span>${esc(n.source?n.source.title+(n.source.author?" · "+n.source.author:""):"loose note")}</span>
        <span>${n.bothSides?"◐ both sides":""}</span></div>
      <div class="tx">${esc(n.text)}</div>
      ${n.sealedWord?`<div class="inkline"><small>my word</small>${esc(n.sealedWord)}</div>`:""}
    </div>`;
  // sources aggregation
  const srcMap={};
  S.notes.forEach(n=>{ if(n.source&&n.source.title){ const k=n.source.title+"|"+(n.source.author||"");
    if(!srcMap[k]) srcMap[k]={title:n.source.title,author:n.source.author||"",type:n.source.type||"book",count:0,reading:n.source.reading||"finished",ids:[]};
    srcMap[k].count++; srcMap[k].ids.push(n.id); if(n.source.reading==="now") srcMap[k].reading="now"; } });
  const looseCount=S.notes.filter(n=>!n.source).length;
  const sources=Object.values(srcMap).sort((a,b)=>b.count-a.count);
  return topBar(unresolvedOnly?"Unresolved":"The Library","· pages ·")+`
  <div style="display:flex;flex-direction:column;flex:1">
    ${unresolvedOnly?"":`<div class="libToggle">
      <button class="${S.libTab==="notes"?"on":""}" onclick="S.libTab='notes';render()">Notes</button>
      <button class="${S.libTab==="sources"?"on":""}" onclick="S.libTab='sources';render()">Sources</button>
    </div>`}
    ${unresolvedOnly ? (
      notes.length? notes.map(paper).join("") : `<p class="emptyRoom">nothing waiting — every page has had its evening</p>`
    ) : S.libTab==="notes" ? `
      ${notes.length===0?`<p class="emptyRoom">the library is empty —<br>bring it one for the books</p>`:""}
      ${sealed.length?`<div class="shelfLabel">Sealed</div>`+sealed.map(paper).join(""):""}
      ${unsealed.length?`<div class="shelfLabel">Unsealed</div>`+unsealed.map(paper).join(""):""}
    ` : `
      ${sources.length===0&&!looseCount?`<p class="emptyRoom">no sources yet — they arrive with the notes</p>`:""}
      ${sources.map((s,i)=>`
        <div class="srcRow">
          <div class="t"><div class="name">${esc(s.title)}</div>
          <div class="meta">${esc(s.author||s.type)} · ${s.count} note${s.count>1?"s":""}</div></div>
          ${s.type==="book"?`<button class="pill ${s.reading==="now"?"":"off"}" onclick="toggleReading('${esc(s.title)}','${esc(s.author)}')">${s.reading==="now"?"reading now":"finished"}</button>`:""}
        </div>`).join("")}
      ${looseCount?`<div class="srcRow"><div class="t"><div class="name">Loose notes</div><div class="meta">${looseCount} note${looseCount>1?"s":""} · no fixed address</div></div></div>`:""}
    `}
    <div class="libFoot">
      <button class="ghost" onclick="exportBackup()">Export backup</button>
      <button class="ghost" onclick="document.getElementById('importInput').click()">Import</button>
      <button class="ghost" onclick="openKeyModal()">⚿ key</button>
    </div>
  </div>`;
}
async function toggleReading(title,author){
  S.notes.forEach(n=>{ if(n.source&&n.source.title===title&&(n.source.author||"")===author){ n.source.reading = n.source.reading==="now"?"finished":"now"; idb.put(n).catch(()=>{}); } });
  render();
}
/* ---- SKY ---- */
function renderSky(){
  const notes = S.notes.filter(n=>n.text);
  if(!notes.length) return topBar("The Night Sky","· connections ·")+`<p class="emptyRoom">the sky is waiting for its first star</p>`;
  // layout: golden-angle spiral, polaris = first sealed (or oldest)
  const sealedSorted = notes.filter(n=>n.sealedWord).sort((a,b)=>(a.sealedAt||a.createdAt)-(b.sealedAt||b.createdAt));
  const polaris = sealedSorted[0] || null;
  const W=400,H=640,cx=W/2,cy=H*0.36;
  const placed=[];
  let k=0;
  notes.slice(0,80).forEach(n=>{
    if(polaris&&n.id===polaris.id){ placed.push({n,x:cx,y:cy,polar:true}); return; }
    const r=54+22*Math.sqrt(k), a=k*2.399963;
    placed.push({n,x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)*0.86}); k++;
  });
  // edges by shared tags
  const edges=[];
  for(let i=0;i<placed.length;i++) for(let j=i+1;j<placed.length;j++){
    const A=placed[i].n.tags||[],B=placed[j].n.tags||[];
    if(A.some(t=>B.includes(t))) edges.push([placed[i],placed[j]]);
    if(edges.length>60) break;
  }
  return topBar("The Night Sky","· connections ·")+`
  <div class="skyWrap">
    <svg viewBox="0 0 ${W} ${H}">
      ${Array.from({length:26},(_,i)=>{const x=(i*137)%W, y=(i*211)%(H-120); return `<circle cx="${x}" cy="${y}" r="${(i%3)*0.3+0.6}" fill="#39404E"/>`;}).join("")}
      ${edges.map(([a,b])=>`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${(a.n.bothSides||b.n.bothSides)?"rgba(157,139,212,.4)":"rgba(231,206,150,.4)"}" stroke-width="1" ${(a.n.bothSides||b.n.bothSides)?'stroke-dasharray="2 5"':""}/>`).join("")}
      ${placed.map(p=>`
        <g onclick="openNote('${p.n.id}')" style="cursor:pointer">
          ${p.polar?`<circle cx="${p.x}" cy="${p.y}" r="11" fill="none" stroke="rgba(231,206,150,.3)"/>`:""}
          <circle cx="${p.x}" cy="${p.y}" r="${p.n.sealedWord?4.2:2.4}" fill="${p.n.sealedWord?"#E7CE96":"#8D93A0"}"/>
          <text x="${p.x}" y="${p.y-10}" text-anchor="middle" style="font-size:8px;letter-spacing:.1em;fill:${p.n.sealedWord?"#E7CE96":"#7E8698"};text-transform:uppercase">${esc((p.n.sealedWord||p.n.text).slice(0,16))}${(p.n.sealedWord||p.n.text).length>16?"…":""}</text>
        </g>`).join("")}
    </svg>
  </div>
  <div style="text-align:center;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#57504A;padding-bottom:66px">sealed notes burn brighter${polaris?" · the ringed star is your first":""}</div>`;
}
/* ---------------- boot ---------------- */
(async function boot(){
  try{ await idb.open(); S.notes=(await idb.all()).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); }catch(e){}
  document.body.className="room-hall";
  render();
  if(!S.key) openKeyModal();
})();
</script>
